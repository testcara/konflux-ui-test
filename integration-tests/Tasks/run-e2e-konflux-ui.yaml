apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: run-e2e-konflux-ui
  annotations:
    tekton.dev/displayName: 'konflux-ui-e2e-tests'
    tekton.dev/categories: 'Pipeline'
    tekton.dev/tags: 'e2e,cypress,konflux-ui'
spec:
  description: >-
    A clean, native Tekton Task to run Konflux UI E2E tests. 
    No Podman, no sidecars, no OCI overhead.
  params:
    - name: job-type
      type: string
      default: 'pr-check'
    - name: cluster-access-secret
      type: string
      description: 'Secret name containing kubeconfig for the Kind cluster'
      default: ''
    - name: cypress-credentials-secret
      type: string
      default: 'cypress-credentials'
    - name: github-credentials-secret
      type: string
      default: 'github-credentials'
    - name: spec-file
      type: string
      default: 'tests/basic-happy-path.spec.ts'
  volumes:
    - name: kubeconfig
      secret:
        secretName: $(params.cluster-access-secret)
        optional: true
    - name: dshm
      emptyDir:
        medium: Memory
  steps:
    - name: run-e2e-test
      image: quay.io/konflux_ui_qe/konflux-ui-tests:latest
      workingDir: /tmp/e2e
      resources:
        limits:
          memory: 8Gi
          cpu: '2'
        requests:
          memory: 8Gi
          cpu: '1'
      volumeMounts:
        - name: kubeconfig
          mountPath: /credentials
          readOnly: true
        - name: dshm
          mountPath: /dev/shm
      env:
        - name: KUBECONFIG
          value: /credentials/kubeconfig
        - name: CYPRESS_USERNAME
          valueFrom:
            secretKeyRef:
              name: $(params.cypress-credentials-secret)
              key: username
        - name: CYPRESS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: $(params.cypress-credentials-secret)
              key: password
        - name: CYPRESS_GH_TOKEN
          valueFrom:
            secretKeyRef:
              name: $(params.github-credentials-secret)
              key: token
        - name: CYPRESS_PROJECT_ID
          valueFrom:
            secretKeyRef:
              name: $(params.cypress-cloud-secret)
              key: project-id
        - name: CYPRESS_RECORD_KEY
          valueFrom:
            secretKeyRef:
              name: $(params.cypress-cloud-secret)
              key: record-key
      script: |
        #!/usr/bin/env bash
        set -euo pipefail
        echo "=== 0. 环境检查 ==="
        echo "Cypress Project ID: ${CYPRESS_PROJECT_ID:-'未设置 (将使用配置文件内定义)'}"
        if [[ -z "${CYPRESS_RECORD_KEY}" ]]; then
            echo "❌ 错误: 未发现 CYPRESS_RECORD_KEY，无法上传结果到 Cloud。"
            exit 1
        fi

        echo "=== 1. Target URL Discovery ==="
        echo "Kubeconfig not found, falling back to default URL..."
        export CYPRESS_KONFLUX_BASE_URL="https://3.23.21.1:9443"
        echo "✓ Base URL set to: ${CYPRESS_KONFLUX_BASE_URL}"

        echo "=== 2. 启动虚拟显示器 (Xvfb) ==="
        if command -v Xvfb &> /dev/null; then
          Xvfb :99 -screen 0 1280x1024x24 &
          export DISPLAY=:99
          sleep 3 
          echo "✓ Xvfb 已启动"
        else
          echo "⚠️ 警告: 未找到 Xvfb，浏览器可能无法在 headless 模式下正常运行"
        fi

        echo "=== 3. 执行测试并录制到 Cypress Cloud ==="

        # 构建运行命令
        # --record: 开启录制
        # --key: 授权密钥
        # --tag: 方便在 Dashboard 过滤
        # --config: 确保开启视频和截图上传
        npx cypress run \
          --browser chrome \
          --spec "$(params.spec-file)" \
          --config video=false,screenshots=false \
          --project . \
          -- --args "--no-sandbox --disable-dev-shm-usage --no-zygote --disable-gpu --disable-software-rasterizer"

        #npx cypress run \
        #  --record \
        #  --key "${CYPRESS_RECORD_KEY}" \
        #  --tag "$(params.job-type)" \
        #  --browser chrome \
        #  --spec "$(params.spec-file)" \
        #  --config video=true,screenshot=true,videoUploadOnPasses=false \
        #  --project . \
        #  -- --args "--no-sandbox --disable-dev-shm-usage --no-zygote --disable-gpu"

        TEST_RESULT=$?

        echo "--------------------------------------------------"
        if [ $TEST_RESULT -eq 0 ]; then
          echo "✅ 测试通过！请前往 Cypress Cloud 查看详细报告。"
        else
          echo "❌ 测试失败 (Exit Code: $TEST_RESULT)。"
          echo "🔍 失败详情、截图和视频已同步至 Cypress Cloud Dashboard。"
        fi
        echo "--------------------------------------------------"

        exit $TEST_RESULT
