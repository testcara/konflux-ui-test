---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: run-e2e-konflux-ui
  annotations:
    tekton.dev/displayName: 'konflux-ui-org-membership'
    tekton.dev/categories: 'Pipeline'
    tekton.dev/tags: 'config,rhads'
spec:
  description: >-
    runs e2e for konflux-ui PR
  params:
    - name: job-spec
      description: 'Job specification metadata'
      type: string
    - name: job-type
      description: 'Type of job (e.g., periodic-stage, periodic, pr)'
      type: string
      default: ""
    - name: git-url
      description: 'Git repository URL'
      type: string
    - name: git-revision
      description: 'Git revision to checkout'
      type: string
      default: "main"
    - name: cypress-credentials-secret
      description: 'Secret name containing Cypress credentials (username, password)'
      type: string
      default: "cypress-credentials"
    - name: slack-credentials-secret
      description: 'Secret name containing Slack credentials'
      type: string
      default: "slack-credentials"
  results:
    - name: e2e-output
      description: 'Result of e2e test'
  volumes:
    - name: source
      emptyDir: {}
  steps:
    - name: clone-repository
      image: quay.io/konflux-ci/appstudio-utils:ab6b0b8e40e440158e7288c73aff1cf83a2cc8a9@sha256:24179f0efd06c65d16868c2d7eb82573cce8e43533de6cea14fec3b7446e0b14
      workingDir: /workspace/source
      volumeMounts:
        - name: source
          mountPath: /workspace/source
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        echo "Cloning $(params.git-url) at revision $(params.git-revision)"

        git clone $(params.git-url) repo
        cd repo
        git checkout $(params.git-revision)

        echo "Repository cloned successfully"
        ls -la
    - name: run-e2e-test
      image: quay.io/konflux_ui_qe/konflux-ui-tests:latest
      workingDir: /tmp/e2e
      volumeMounts:
        - name: source
          mountPath: /workspace/source
      env:
        - name: JOB_SPEC
          value: $(params.job-spec)
        - name: JOB_TYPE
          value: $(params.job-type)
        - name: CYPRESS_LOCAL_CLUSTER
          value: "true"
        - name: CYPRESS_PERIODIC_RUN_STAGE
          value: "false"
        - name: CYPRESS_USERNAME
          valueFrom:
            secretKeyRef:
              name: $(params.cypress-credentials-secret)
              key: username
        - name: CYPRESS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: $(params.cypress-credentials-secret)
              key: password
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        echo "Running Cypress E2E tests"
        echo "Job Type: ${JOB_TYPE}"

        # Determine test configuration based on job type
        if [[ ${JOB_TYPE} == 'periodic-stage' ]]; then
          echo "Running test suite against stage backend..."
          export CYPRESS_LOCAL_CLUSTER=false
          export CYPRESS_PERIODIC_RUN_STAGE=true
        else
          echo "Running test suite against local Konflux UI in kind cluster"
        fi

        # Run Cypress tests (test code is in /tmp/e2e in the image)
        SPEC_FILE="tests/basic-happy-path.spec.ts"
        echo "Running tests from ${SPEC_FILE}"

        npx cypress run -b chrome --spec "${SPEC_FILE}" || EXIT_CODE=$?

        # Store the exit code
        EXIT_CODE=${EXIT_CODE:-0}
        echo ${EXIT_CODE} > /tmp/e2e-exit-code
        exit ${EXIT_CODE}

    - name: report-to-slack
      image: quay.io/konflux-ci/appstudio-utils:ab6b0b8e40e440158e7288c73aff1cf83a2cc8a9@sha256:24179f0efd06c65d16868c2d7eb82573cce8e43533de6cea14fec3b7446e0b14
      workingDir: /workspace/source/repo
      volumeMounts:
        - name: source
          mountPath: /workspace/source
      env:
        - name: JOB_TYPE
          value: $(params.job-type)
        - name: SLACK_TOKEN
          valueFrom:
            secretKeyRef:
              name: $(params.slack-credentials-secret)
              key: token
              optional: true
        - name: SLACK_CHANNEL_ID
          valueFrom:
            configMapKeyRef:
              name: slack-config
              key: channel-id
              optional: true
      script: |
        #!/usr/bin/env bash

        # Report job result to Slack (always runs)
        E2E_OUTCOME="success"
        if [[ -f /tmp/e2e-exit-code ]] && [[ $(cat /tmp/e2e-exit-code) -ne 0 ]]; then
          E2E_OUTCOME="failure"
        fi

        if [[ ${JOB_TYPE} == periodic* ]]; then
          ./pr_check.sh send-report ${E2E_OUTCOME}
        fi
