---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: run-e2e-konflux-ui
  annotations:
    tekton.dev/displayName: 'konflux-ui-e2e-tests'
    tekton.dev/categories: 'Pipeline'
    tekton.dev/tags: 'e2e,cypress,konflux-ui'
spec:
  description: >-
    Runs E2E tests for Konflux UI using Cypress
  params:
    - name: job-spec
      description: 'Job specification metadata'
      type: string
    - name: job-type
      description: 'Type of job (e.g., periodic-stage, periodic, pr)'
      type: string
      default: ""
    - name: git-url
      description: 'Git repository URL'
      type: string
    - name: git-revision
      description: 'Git revision to checkout'
      type: string
      default: "main"
    - name: cypress-credentials-secret
      description: 'Secret name containing Cypress credentials (username, password)'
      type: string
      default: "cypress-credentials"
    - name: slack-credentials-secret
      description: 'Secret name containing Slack credentials'
      type: string
      default: "slack-credentials"
    - name: github-credentials-secret
      description: 'Secret name containing GitHub token'
      type: string
      default: "github-credentials"
    - name: cluster-access-secret
      description: 'Secret name containing kubeconfig for accessing Kind cluster'
      type: string
      default: ""
  results:
    - name: e2e-output
      description: 'Result of e2e test'
  volumes:
    - name: kubeconfig
      secret:
        secretName: $(params.cluster-access-secret)
        optional: true
  sidecars:
    - name: port-forward
      image: quay.io/konflux-ci/appstudio-utils:ab6b0b8e40e440158e7288c73aff1cf83a2cc8a9@sha256:24179f0efd06c65d16868c2d7eb82573cce8e43533de6cea14fec3b7446e0b14
      volumeMounts:
        - name: kubeconfig
          mountPath: /credentials
      env:
        - name: JOB_TYPE
          value: $(params.job-type)
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        # Skip port forwarding for periodic-stage jobs
        if [[ "${JOB_TYPE}" == "periodic-stage" ]]; then
          echo "Skipping port forward for periodic-stage job"
          sleep infinity
          exit 0
        fi

        # Check if kubeconfig exists
        if [[ ! -f /credentials/kubeconfig ]]; then
          echo "WARNING: kubeconfig not found, skipping port forward"
          sleep infinity
          exit 0
        fi

        export KUBECONFIG=/credentials/kubeconfig

        echo "=== Port Forward Sidecar Starting ==="
        echo "Waiting for Konflux UI deployment to be ready..."

        # Wait for deployment
        kubectl wait --for=condition=available --timeout=300s deployment/proxy -n konflux-ui || {
          echo "ERROR: Konflux UI proxy deployment not ready"
          kubectl get pods -n konflux-ui
          exit 1
        }

        echo "✓ Deployment is ready"

        # Get service info
        kubectl get svc proxy -n konflux-ui -o wide

        # Start port forward
        echo ""
        echo "Starting port-forward: localhost:8080 -> svc/proxy:8888"
        kubectl port-forward -n konflux-ui svc/proxy 8080:8888
  steps:
    - name: run-e2e-test
      image: quay.io/konflux_ui_qe/konflux-ui-tests:latest
      workingDir: /tmp/e2e
      env:
        - name: JOB_SPEC
          value: $(params.job-spec)
        - name: JOB_TYPE
          value: $(params.job-type)
        - name: CYPRESS_LOCAL_CLUSTER
          value: "true"
        - name: CYPRESS_PERIODIC_RUN_STAGE
          value: "false"
        - name: CYPRESS_USERNAME
          valueFrom:
            secretKeyRef:
              name: $(params.cypress-credentials-secret)
              key: username
        - name: CYPRESS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: $(params.cypress-credentials-secret)
              key: password
        - name: GH_TOKEN
          valueFrom:
            secretKeyRef:
              name: $(params.github-credentials-secret)
              key: token
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        echo "=== Running Cypress E2E Tests ==="
        echo "Job Type: ${JOB_TYPE}"

        # Verify GH_TOKEN
        if [[ -z "${GH_TOKEN:-}" ]]; then
          echo "ERROR: GH_TOKEN is not set!"
          exit 1
        fi
        echo "✓ GH_TOKEN is set (length: ${#GH_TOKEN})"

        # Configure based on job type
        if [[ ${JOB_TYPE} == 'periodic-stage' ]]; then
          echo "Running against stage environment..."
          export CYPRESS_LOCAL_CLUSTER=false
          export CYPRESS_PERIODIC_RUN_STAGE=true
        else
          echo "Running against local Kind cluster..."

          # Wait for port-forward sidecar to be ready
          echo "Waiting for port-forward sidecar..."
          MAX_WAIT=60
          ELAPSED=0

          while [[ ${ELAPSED} -lt ${MAX_WAIT} ]]; do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:8080 2>/dev/null | grep -qE "^(200|301|302|304|401|403|404)$"; then
              echo "✓ Port-forward is ready!"
              break
            fi
            echo "Waiting for port-forward (${ELAPSED}s/${MAX_WAIT}s)..."
            sleep 3
            ELAPSED=$((ELAPSED + 3))
          done

          if [[ ${ELAPSED} -ge ${MAX_WAIT} ]]; then
            echo "ERROR: Port-forward not ready after ${MAX_WAIT}s"
            exit 1
          fi

          export CYPRESS_BASE_URL="http://localhost:8080"
        fi

        # Run tests
        SPEC_FILE="tests/basic-happy-path.spec.ts"
        echo ""
        echo "Running: ${SPEC_FILE}"
        echo "CYPRESS_BASE_URL: ${CYPRESS_BASE_URL:-not set}"
        echo ""

        npx cypress run -b chrome --spec "${SPEC_FILE}" --env "GH_TOKEN=${GH_TOKEN}" || EXIT_CODE=$?

        EXIT_CODE=${EXIT_CODE:-0}
        echo ${EXIT_CODE} > /tmp/e2e-exit-code
        exit ${EXIT_CODE}

    - name: report-to-slack
      image: quay.io/konflux-ci/appstudio-utils:ab6b0b8e40e440158e7288c73aff1cf83a2cc8a9@sha256:24179f0efd06c65d16868c2d7eb82573cce8e43533de6cea14fec3b7446e0b14
      env:
        - name: JOB_TYPE
          value: $(params.job-type)
        - name: SLACK_TOKEN
          valueFrom:
            secretKeyRef:
              name: $(params.slack-credentials-secret)
              key: token
              optional: true
        - name: SLACK_CHANNEL_ID
          valueFrom:
            configMapKeyRef:
              name: slack-config
              key: channel-id
              optional: true
        - name: PIPELINE_RUN_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.labels['tekton.dev/pipelineRun']
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
      script: |
        #!/usr/bin/env bash

        # Only send Slack report for periodic jobs
        if [[ ! ${JOB_TYPE} == periodic* ]]; then
          echo "Not a periodic job (JOB_TYPE=${JOB_TYPE}), skipping Slack report"
          exit 0
        fi

        # Check if Slack is configured
        if [[ -z "${SLACK_TOKEN}" || -z "${SLACK_CHANNEL_ID}" ]]; then
          echo "Slack not configured, skipping report"
          exit 0
        fi

        # Determine test outcome
        E2E_OUTCOME="success"
        if [[ -f /tmp/e2e-exit-code ]] && [[ $(cat /tmp/e2e-exit-code) -ne 0 ]]; then
          E2E_OUTCOME="failure"
        fi

        # Generate message
        if [[ $E2E_OUTCOME == "success" ]]; then
          ICON=":white_check_mark:"
        else
          ICON=":x:"
        fi

        DATE_STR=$(date '+%b %-d')

        case "$JOB_TYPE" in
          "periodic-local")
            JOB_DESC="LOCAL Periodic job"
            ;;
          "periodic-stage")
            JOB_DESC="STAGE Periodic job"
            ;;
          "periodic-cleanup")
            JOB_DESC="CLEANUP Periodic job"
            ;;
          *)
            JOB_DESC="Periodic job (${JOB_TYPE})"
            ;;
        esac

        # Add PipelineRun info to message
        if [[ -n "${PIPELINE_RUN_NAME}" ]]; then
          MESSAGE="${ICON} Report ${DATE_STR}: ${JOB_DESC} (PipelineRun: ${PIPELINE_RUN_NAME})"
        else
          MESSAGE="${ICON} Report ${DATE_STR}: ${JOB_DESC}"
        fi

        echo "Sending Slack notification: ${MESSAGE}"

        # Send to Slack
        curl -X POST https://slack.com/api/chat.postMessage \
          -H "Authorization: Bearer ${SLACK_TOKEN}" \
          -H "Content-Type: application/json; charset=utf-8" \
          -d "{\"channel\": \"${SLACK_CHANNEL_ID}\", \"text\": \"${MESSAGE}\"}" \
          || echo "Failed to send Slack notification (non-fatal)"
