---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: run-e2e-konflux-ui
  annotations:
    tekton.dev/displayName: 'konflux-ui-org-membership'
    tekton.dev/categories: 'Pipeline'
    tekton.dev/tags: 'config,rhads'
spec:
  description: >-
    runs e2e for konflux-ui PR
  params:
    - name: job-spec
      description: 'Job specification metadata'
      type: string
    - name: job-type
      description: 'Type of job (e.g., periodic-stage, periodic, pr)'
      type: string
      default: ""
    - name: git-url
      description: 'Git repository URL'
      type: string
    - name: git-revision
      description: 'Git revision to checkout'
      type: string
      default: "main"
    - name: cypress-credentials-secret
      description: 'Secret name containing Cypress credentials (username, password)'
      type: string
      default: "cypress-credentials"
    - name: slack-credentials-secret
      description: 'Secret name containing Slack credentials'
      type: string
      default: "slack-credentials"
    - name: github-credentials-secret
      description: 'Secret name containing GitHub token'
      type: string
      default: "github-credentials"
    - name: cluster-access-secret
      description: 'Secret name containing kubeconfig for accessing Kind cluster'
      type: string
      default: ""
  results:
    - name: e2e-output
      description: 'Result of e2e test'
  volumes:
    - name: source
      emptyDir: {}
    - name: kubeconfig
      secret:
        secretName: $(params.cluster-access-secret)
        optional: true
  steps:
    - name: clone-repository
      image: quay.io/konflux-ci/appstudio-utils:ab6b0b8e40e440158e7288c73aff1cf83a2cc8a9@sha256:24179f0efd06c65d16868c2d7eb82573cce8e43533de6cea14fec3b7446e0b14
      workingDir: /workspace/source
      volumeMounts:
        - name: source
          mountPath: /workspace/source
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        echo "Cloning $(params.git-url) at revision $(params.git-revision)"

        git clone $(params.git-url) repo
        cd repo
        git checkout $(params.git-revision)

        echo "Repository cloned successfully"
        ls -la
    - name: setup-port-forward
      image: quay.io/konflux-ci/appstudio-utils:ab6b0b8e40e440158e7288c73aff1cf83a2cc8a9@sha256:24179f0efd06c65d16868c2d7eb82573cce8e43533de6cea14fec3b7446e0b14
      volumeMounts:
        - name: kubeconfig
          mountPath: /credentials
      env:
        - name: JOB_TYPE
          value: $(params.job-type)
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        # Skip port forwarding for periodic-stage jobs (they use remote stage environment)
        if [[ "${JOB_TYPE}" == "periodic-stage" ]]; then
          echo "Skipping port forward setup for periodic-stage job"
          exit 0
        fi

        # Check if kubeconfig exists
        if [[ ! -f /credentials/kubeconfig ]]; then
          echo "WARNING: kubeconfig not found, skipping port forward"
          echo "This is expected for periodic-stage jobs"
          exit 0
        fi

        export KUBECONFIG=/credentials/kubeconfig

        echo "Setting up port forward to Konflux UI in Kind cluster..."

        # List namespaces for debugging
        echo "Available namespaces in Kind cluster:"
        kubectl get namespaces

        # Wait for Konflux UI proxy deployment to be ready
        echo "Waiting for Konflux UI proxy deployment in konflux-ui namespace..."
        kubectl wait --for=condition=available --timeout=300s deployment/proxy -n konflux-ui || {
          echo "ERROR: Konflux UI proxy deployment not ready"
          echo "Checking pods in konflux-ui namespace:"
          kubectl get pods -n konflux-ui
          echo "Checking deployment:"
          kubectl get deployment proxy -n konflux-ui
          exit 1
        }

        # Start port forward in background
        echo "Starting port forward from localhost:8080 to proxy service in konflux-ui namespace..."
        kubectl port-forward -n konflux-ui svc/proxy 8080:8080 &
        PORT_FORWARD_PID=$!
        echo "Port forward started with PID: ${PORT_FORWARD_PID}"

        # Save PID for cleanup (store in a shared location)
        echo ${PORT_FORWARD_PID} > /tmp/port-forward-pid

        # Wait for port forward to establish
        echo "Waiting for port forward to establish..."
        sleep 10

        # Verify port forward is working
        echo "Verifying port forward..."
        if curl -k -s -o /dev/null -w "%{http_code}" https://localhost:8080 | grep -q "200\|301\|302\|404"; then
          echo "✓ Port forward is working on HTTPS!"
        elif curl -s -o /dev/null -w "%{http_code}" http://localhost:8080 | grep -q "200\|301\|302\|404"; then
          echo "✓ Port forward is working on HTTP!"
        else
          echo "WARNING: Port forward may not be working correctly"
          echo "Attempting to test connection..."
          curl -v http://localhost:8080 2>&1 | head -20 || true
        fi
    - name: run-e2e-test
      image: quay.io/konflux_ui_qe/konflux-ui-tests:latest
      workingDir: /tmp/e2e
      volumeMounts:
        - name: source
          mountPath: /workspace/source
      env:
        - name: JOB_SPEC
          value: $(params.job-spec)
        - name: JOB_TYPE
          value: $(params.job-type)
        - name: CYPRESS_LOCAL_CLUSTER
          value: "true"
        - name: CYPRESS_PERIODIC_RUN_STAGE
          value: "false"
        - name: CYPRESS_USERNAME
          valueFrom:
            secretKeyRef:
              name: $(params.cypress-credentials-secret)
              key: username
        - name: CYPRESS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: $(params.cypress-credentials-secret)
              key: password
        - name: GH_TOKEN
          valueFrom:
            secretKeyRef:
              name: $(params.github-credentials-secret)
              key: token
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        echo "Running Cypress E2E tests"
        echo "Job Type: ${JOB_TYPE}"

        # Debug: Check if GH_TOKEN is set
        if [[ -z "${GH_TOKEN:-}" ]]; then
          echo "ERROR: GH_TOKEN is not set!"
          exit 1
        else
          echo "GH_TOKEN is set (length: ${#GH_TOKEN})"
        fi

        # Determine test configuration based on job type
        if [[ ${JOB_TYPE} == 'periodic-stage' ]]; then
          echo "Running test suite against stage backend..."
          export CYPRESS_LOCAL_CLUSTER=false
          export CYPRESS_PERIODIC_RUN_STAGE=true
        else
          echo "Running test suite against local Konflux UI in kind cluster"
        fi

        # Run Cypress tests (test code is in /tmp/e2e in the image)
        SPEC_FILE="tests/basic-happy-path.spec.ts"
        echo "Running tests from ${SPEC_FILE}"

        # Run Cypress with environment variables passed via --env flag
        # Cypress automatically picks up CYPRESS_* variables, but GH_TOKEN needs to be explicit
        npx cypress run -b chrome --spec "${SPEC_FILE}" --env "GH_TOKEN=${GH_TOKEN}" || EXIT_CODE=$?

        # Store the exit code
        EXIT_CODE=${EXIT_CODE:-0}
        echo ${EXIT_CODE} > /tmp/e2e-exit-code
        exit ${EXIT_CODE}

    - name: report-to-slack
      image: quay.io/konflux-ci/appstudio-utils:ab6b0b8e40e440158e7288c73aff1cf83a2cc8a9@sha256:24179f0efd06c65d16868c2d7eb82573cce8e43533de6cea14fec3b7446e0b14
      env:
        - name: JOB_TYPE
          value: $(params.job-type)
        - name: SLACK_TOKEN
          valueFrom:
            secretKeyRef:
              name: $(params.slack-credentials-secret)
              key: token
              optional: true
        - name: SLACK_CHANNEL_ID
          valueFrom:
            configMapKeyRef:
              name: slack-config
              key: channel-id
              optional: true
        - name: PIPELINE_RUN_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.labels['tekton.dev/pipelineRun']
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
      script: |
        #!/usr/bin/env bash

        # Only send Slack report for periodic jobs
        if [[ ! ${JOB_TYPE} == periodic* ]]; then
          echo "Not a periodic job (JOB_TYPE=${JOB_TYPE}), skipping Slack report"
          exit 0
        fi

        # Check if Slack is configured
        if [[ -z "${SLACK_TOKEN}" || -z "${SLACK_CHANNEL_ID}" ]]; then
          echo "Slack not configured, skipping report"
          exit 0
        fi

        # Determine test outcome
        E2E_OUTCOME="success"
        if [[ -f /tmp/e2e-exit-code ]] && [[ $(cat /tmp/e2e-exit-code) -ne 0 ]]; then
          E2E_OUTCOME="failure"
        fi

        # Generate message
        if [[ $E2E_OUTCOME == "success" ]]; then
          ICON=":white_check_mark:"
        else
          ICON=":x:"
        fi

        DATE_STR=$(date '+%b %-d')

        case "$JOB_TYPE" in
          "periodic-local")
            JOB_DESC="LOCAL Periodic job"
            ;;
          "periodic-stage")
            JOB_DESC="STAGE Periodic job"
            ;;
          "periodic-cleanup")
            JOB_DESC="CLEANUP Periodic job"
            ;;
          *)
            JOB_DESC="Periodic job (${JOB_TYPE})"
            ;;
        esac

        # Add PipelineRun info to message
        if [[ -n "${PIPELINE_RUN_NAME}" ]]; then
          MESSAGE="${ICON} Report ${DATE_STR}: ${JOB_DESC} (PipelineRun: ${PIPELINE_RUN_NAME})"
        else
          MESSAGE="${ICON} Report ${DATE_STR}: ${JOB_DESC}"
        fi

        echo "Sending Slack notification: ${MESSAGE}"

        # Send to Slack
        curl -X POST https://slack.com/api/chat.postMessage \
          -H "Authorization: Bearer ${SLACK_TOKEN}" \
          -H "Content-Type: application/json; charset=utf-8" \
          -d "{\"channel\": \"${SLACK_CHANNEL_ID}\", \"text\": \"${MESSAGE}\"}" \
          || echo "Failed to send Slack notification (non-fatal)"
