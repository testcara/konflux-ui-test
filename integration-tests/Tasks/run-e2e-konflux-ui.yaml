apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: run-e2e-konflux-ui
  annotations:
    tekton.dev/displayName: 'konflux-ui-e2e-tests'
    tekton.dev/categories: 'Pipeline'
    tekton.dev/tags: 'e2e,cypress,konflux-ui'
spec:
  description: >-
    A clean, native Tekton Task to run Konflux UI E2E tests. 
    No Podman, no sidecars, no OCI overhead.
  params:
    - name: job-type
      type: string
      default: 'pr-check'
    - name: cypress-credentials-secret
      type: string
      default: 'cypress-credentials'
    - name: github-credentials-secret
      type: string
      default: 'github-credentials'
    - name: spec-file
      type: string
      default: 'tests/basic-happy-path.spec.ts'
  volumes:
    - name: dshm
      emptyDir:
        medium: Memory
  steps:
    - name: run-e2e-test
      image: quay.io/konflux_ui_qe/konflux-ui-tests:latest
      workingDir: /tmp/e2e
      resources:
        limits:
          memory: 8Gi
          cpu: '2'
        requests:
          memory: 8Gi
          cpu: '1'
      volumeMounts:
        - name: dshm
          mountPath: /dev/shm
      env:
        - name: CYPRESS_USERNAME
          valueFrom:
            secretKeyRef:
              name: $(params.cypress-credentials-secret)
              key: username
        - name: CYPRESS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: $(params.cypress-credentials-secret)
              key: password
        - name: CYPRESS_GH_TOKEN
          valueFrom:
            secretKeyRef:
              name: $(params.github-credentials-secret)
              key: token
        - name: CYPRESS_PROJECT_ID
          valueFrom:
            secretKeyRef:
              name: $(params.cypress-cloud-secret)
              key: project-id
        - name: CYPRESS_RECORD_KEY
          valueFrom:
            secretKeyRef:
              name: $(params.cypress-cloud-secret)
              key: record-key
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        echo "=== Getting PipelineRun name and kubeconfig ==="

        # Get PipelineRun name from the TaskRun's owner reference or labels
        PIPELINE_RUN_NAME=$(kubectl get taskrun $(context.taskRun.name) -o jsonpath='{.metadata.labels.tekton\.dev/pipelineRun}')
        echo "PipelineRun name: ${PIPELINE_RUN_NAME}"

        # Construct the secret name
        SECRET_NAME="kfg-${PIPELINE_RUN_NAME}"
        echo "Looking for secret: ${SECRET_NAME}"

        # Extract kubeconfig from the secret
        KUBECONFIG_CONTENT=$(kubectl get secret ${SECRET_NAME} -o jsonpath='{.data.kubeconfig}' | base64 -d)

        # Write kubeconfig to a temporary file
        mkdir -p /tmp/credentials
        echo "${KUBECONFIG_CONTENT}" > /tmp/credentials/kubeconfig
        export KUBECONFIG=/tmp/credentials/kubeconfig

        echo "=== Extracting Konflux base URL from kubeconfig ==="

        # Extract the server URL from kubeconfig
        KUBE_SERVER=$(kubectl config view --minify -o jsonpath='{.clusters[0].cluster.server}')
        echo "Kubernetes API server: ${KUBE_SERVER}"

        # Extract IP address (remove https:// prefix and :6443 port)
        KUBE_IP=$(echo "${KUBE_SERVER}" | sed -E 's|https?://([^:]+):.*|\1|')
        echo "Extracted IP: ${KUBE_IP}"

        # Construct Konflux base URL with port 9443
        export CYPRESS_KONFLUX_BASE_URL="https://${KUBE_IP}:9443"
        echo "Konflux base URL: ${CYPRESS_KONFLUX_BASE_URL}"

        echo "=== Running E2E tests ==="
        CYPRESS_GH_TOKEN=${CYPRESS_GH_TOKEN} CYPRESS_LOCAL_CLUSTER=true CYPRESS_KONFLUX_BASE_URL=${CYPRESS_KONFLUX_BASE_URL} yarn run cy:run
        TEST_RESULT=$?

        exit $TEST_RESULT
