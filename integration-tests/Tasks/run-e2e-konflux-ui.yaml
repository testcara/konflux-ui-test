apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: run-e2e-konflux-ui
  annotations:
    tekton.dev/displayName: 'konflux-ui-e2e-tests'
    tekton.dev/categories: 'Pipeline'
    tekton.dev/tags: 'e2e,cypress,konflux-ui'
spec:
  description: >-
    A clean, native Tekton Task to run Konflux UI E2E tests. 
    No Podman, no sidecars, no OCI overhead.
  params:
    - name: job-type
      type: string
      default: 'pr-check'
    - name: test-image
      type: string
      default: 'quay.io/konflux_ui_qe/konflux-ui-tests:latest'
      description: 'Test image to use for E2E tests'
    - name: cypress-credentials-secret
      type: string
      default: 'cypress-credentials'
    - name: cypress-cloud-secret
      type: string
      default: 'cypress-cloud-credentials'
    - name: github-credentials-secret
      type: string
      default: 'github-credentials'
    - name: spec-file
      type: string
      default: 'tests/basic-happy-path.spec.ts'
    - name: oci-storage
      type: string
      description: 'OCI repository to store test artifacts'
    - name: oci-credentials-secret
      type: string
      description: 'Secret containing OCI registry credentials'
  volumes:
    - name: dshm
      emptyDir:
        medium: Memory
    - name: kubeconfig-data
      emptyDir: {}
    - name: test-artifacts
      emptyDir: {}
  steps:
    - name: fix-smee-client
      image: bitnami/kubectl:latest
      workingDir: /workspace
      volumeMounts:
        - name: kubeconfig-data
          mountPath: /shared
      env:
        - name: TEKTON_PIPELINE_RUN
          valueFrom:
            fieldRef:
              fieldPath: metadata.labels['tekton.dev/pipelineRun']
        - name: TEKTON_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        echo "=== Getting PipelineRun name and kubeconfig ==="

        # Get PipelineRun name and namespace from environment variables set by Tekton
        PIPELINE_RUN_NAME="${TEKTON_PIPELINE_RUN}"
        NAMESPACE="${TEKTON_NAMESPACE}"
        echo "PipelineRun name: ${PIPELINE_RUN_NAME}"
        echo "Namespace: ${NAMESPACE}"

        # Construct the secret name
        SECRET_NAME="kfg-${PIPELINE_RUN_NAME}"
        echo "Looking for secret: ${SECRET_NAME}"

        # Extract kubeconfig from the secret (this runs in Konflux cluster context)
        kubectl get secret ${SECRET_NAME} -n ${NAMESPACE} -o jsonpath='{.data.kubeconfig}' | base64 -d > /shared/kubeconfig

        # Switch to Kind cluster context
        export KUBECONFIG=/shared/kubeconfig

        echo "=== Extracting Konflux base URL from kubeconfig ==="

        # Extract the server URL from kubeconfig
        KUBE_SERVER=$(kubectl config view --minify -o jsonpath='{.clusters[0].cluster.server}')
        echo "Kubernetes API server: ${KUBE_SERVER}"

        # Extract IP address (remove https:// prefix and :6443 port)
        KUBE_IP=$(echo "${KUBE_SERVER}" | sed -E 's|https?://([^:]+):.*|\1|')
        echo "Extracted IP: ${KUBE_IP}"

        # Construct Konflux base URL with port 9443
        CYPRESS_KONFLUX_BASE_URL="https://${KUBE_IP}:9443"
        echo "Konflux base URL: ${CYPRESS_KONFLUX_BASE_URL}"

        # Save to shared volume for next step
        echo "${CYPRESS_KONFLUX_BASE_URL}" > /shared/base-url

        echo "=== Fixing smee-client configuration ==="

        # Get the current smee.io URL from the deployment
        SMEE_URL=$(kubectl get deployment gosmee-client -n smee-client -o jsonpath='{.spec.template.spec.containers[0].args[1]}')
        echo "Current smee.io URL: ${SMEE_URL}"

        # Fix smee-client by patching args and liveness probe
        echo "Updating smee-client deployment..."
        kubectl patch deployment gosmee-client -n smee-client --type='json' -p='[
          {"op": "replace", "path": "/spec/template/spec/containers/0/args", "value": ["client", "'"${SMEE_URL}"'", "http://pipelines-as-code-controller.pipelines-as-code.svc.cluster.local:8180"]},
          {"op": "replace", "path": "/spec/template/spec/containers/0/livenessProbe/failureThreshold", "value": 5},
          {"op": "replace", "path": "/spec/template/spec/containers/0/livenessProbe/initialDelaySeconds", "value": 60},
          {"op": "replace", "path": "/spec/template/spec/containers/0/livenessProbe/timeoutSeconds", "value": 30}
        ]'

        # Wait for smee-client to be ready
        echo "Waiting for smee-client deployment to be ready..."
        kubectl rollout status deployment/gosmee-client -n smee-client --timeout=5m

        # Verify smee-client is running
        SMEE_POD=$(kubectl get pod -n smee-client -l app=gosmee-client -o jsonpath='{.items[0].metadata.name}')
        echo "smee-client pod: ${SMEE_POD}"
        kubectl get pod ${SMEE_POD} -n smee-client

        echo "smee-client is ready!"
        echo "Setup complete. Ready for E2E tests."
    - name: run-e2e-test
      image: $(params.test-image)
      workingDir: /tmp/e2e
      resources:
        limits:
          memory: 8Gi
          cpu: '2'
        requests:
          memory: 8Gi
          cpu: '1'
      volumeMounts:
        - name: dshm
          mountPath: /dev/shm
        - name: kubeconfig-data
          mountPath: /shared
          readOnly: true
        - name: test-artifacts
          mountPath: /artifacts
      env:
        - name: CYPRESS_USERNAME
          valueFrom:
            secretKeyRef:
              name: $(params.cypress-credentials-secret)
              key: username
        - name: CYPRESS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: $(params.cypress-credentials-secret)
              key: password
        - name: CYPRESS_GH_TOKEN
          valueFrom:
            secretKeyRef:
              name: $(params.github-credentials-secret)
              key: token
        - name: CYPRESS_PROJECT_ID
          valueFrom:
            secretKeyRef:
              name: $(params.cypress-cloud-secret)
              key: project-id
        - name: CYPRESS_RECORD_KEY
          valueFrom:
            secretKeyRef:
              name: $(params.cypress-cloud-secret)
              key: record-key
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        echo "=== Loading configuration from setup step ==="

        # Read base URL from shared volume
        export CYPRESS_KONFLUX_BASE_URL=$(cat /shared/base-url)
        echo "Konflux base URL: ${CYPRESS_KONFLUX_BASE_URL}"

        echo "=== Running E2E tests ==="
        SPEC_FILE="$(params.spec-file)"
        echo "Running test spec: ${SPEC_FILE}"

        CYPRESS_GH_TOKEN=${CYPRESS_GH_TOKEN} CYPRESS_LOCAL_CLUSTER=true CYPRESS_KONFLUX_BASE_URL=${CYPRESS_KONFLUX_BASE_URL} yarn run cy:run --spec "${SPEC_FILE}"
        TEST_RESULT=$?

        echo "=== Collecting test artifacts ==="
        mkdir -p /artifacts

        # Copy Cypress artifacts if they exist
        if [ -d "cypress/videos" ]; then
          echo "Copying videos..."
          cp -r cypress/videos /artifacts/ || true
        fi

        if [ -d "cypress/screenshots" ]; then
          echo "Copying screenshots..."
          cp -r cypress/screenshots /artifacts/ || true
        fi

        # Copy test reports
        if [ -f "cypress/results/junit.xml" ]; then
          echo "Copying JUnit report..."
          cp cypress/results/junit.xml /artifacts/e2e-report.xml || true
        fi

        # Create a simple test log
        echo "Test execution completed with exit code: ${TEST_RESULT}" > /artifacts/e2e-tests.log
        echo "Timestamp: $(date)" >> /artifacts/e2e-tests.log
        echo "Base URL: ${CYPRESS_KONFLUX_BASE_URL}" >> /artifacts/e2e-tests.log

        # List collected artifacts
        echo "Artifacts collected:"
        ls -lah /artifacts/

        exit $TEST_RESULT
    - name: upload-artifacts
      onError: continue
      image: ghcr.io/oras-project/oras:v1.1.0
      workingDir: /workspace
      volumeMounts:
        - name: test-artifacts
          mountPath: /artifacts
          readOnly: true
        - name: kubeconfig-data
          mountPath: /shared
          readOnly: true
      env:
        - name: TEKTON_PIPELINE_RUN
          valueFrom:
            fieldRef:
              fieldPath: metadata.labels['tekton.dev/pipelineRun']
      script: |
        #!/usr/bin/env sh
        set -euo pipefail

        echo "=== Uploading test artifacts to OCI registry ==="

        PIPELINE_RUN_NAME="${TEKTON_PIPELINE_RUN}"
        OCI_REPO="$(params.oci-storage)"

        # Construct the full OCI reference
        OCI_REF="${OCI_REPO}:${PIPELINE_RUN_NAME}"
        echo "Uploading to: ${OCI_REF}"

        # Check if there are any artifacts to upload
        if [ -z "$(ls -A /artifacts)" ]; then
          echo "⚠️  No artifacts found to upload"
          exit 0
        fi

        echo "Artifacts to upload:"
        ls -lah /artifacts/

        # Upload artifacts using ORAS
        cd /artifacts
        oras push "${OCI_REF}" \
          --annotation "org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
          --annotation "org.opencontainers.image.title=E2E Test Artifacts" \
          --annotation "pipeline.run=${PIPELINE_RUN_NAME}" \
          ./:application/vnd.oci.image.layer.v1.tar+gzip

        echo "✅ Artifacts uploaded successfully to ${OCI_REF}"
        echo ""
        echo "Download artifacts with:"
        echo "  oras pull ${OCI_REF}"
