---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: run-e2e-konflux-ui
  annotations:
    tekton.dev/displayName: 'konflux-ui-org-membership'
    tekton.dev/categories: 'Pipeline'
    tekton.dev/tags: 'config,rhads'
spec:
  description: >-
    runs e2e for konflux-ui PR
  params:
    - name: job-spec
      description: 'Job specification metadata'
      type: string
    - name: job-type
      description: 'Type of job (e.g., periodic-stage, periodic, pr)'
      type: string
      default: ""
    - name: git-url
      description: 'Git repository URL'
      type: string
    - name: git-revision
      description: 'Git revision to checkout'
      type: string
      default: "main"
    - name: cypress-credentials-secret
      description: 'Secret name containing Cypress credentials (username, password)'
      type: string
      default: "cypress-credentials"
    - name: slack-credentials-secret
      description: 'Secret name containing Slack credentials'
      type: string
      default: "slack-credentials"
    - name: github-credentials-secret
      description: 'Secret name containing GitHub token'
      type: string
      default: "github-credentials"
    - name: cluster-access-secret
      description: 'Secret name containing kubeconfig for accessing Kind cluster'
      type: string
      default: ""
    - name: debug-pause-minutes
      description: 'Minutes to pause for manual debugging after port-forward setup (0 to skip)'
      type: string
      default: "0"
  results:
    - name: e2e-output
      description: 'Result of e2e test'
    - name: service-url
      description: 'Konflux UI service URL in Kind cluster'
    - name: service-https-url
      description: 'Konflux UI service HTTPS URL in Kind cluster'
  volumes:
    - name: source
      emptyDir: {}
    - name: kubeconfig
      secret:
        secretName: $(params.cluster-access-secret)
        optional: true
  steps:
    - name: clone-repository
      image: quay.io/konflux-ci/appstudio-utils:ab6b0b8e40e440158e7288c73aff1cf83a2cc8a9@sha256:24179f0efd06c65d16868c2d7eb82573cce8e43533de6cea14fec3b7446e0b14
      workingDir: /workspace/source
      volumeMounts:
        - name: source
          mountPath: /workspace/source
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        echo "Cloning $(params.git-url) at revision $(params.git-revision)"

        git clone $(params.git-url) repo
        cd repo
        git checkout $(params.git-revision)

        echo "Repository cloned successfully"
        ls -la
    - name: setup-port-forward
      image: quay.io/konflux-ci/appstudio-utils:ab6b0b8e40e440158e7288c73aff1cf83a2cc8a9@sha256:24179f0efd06c65d16868c2d7eb82573cce8e43533de6cea14fec3b7446e0b14
      volumeMounts:
        - name: kubeconfig
          mountPath: /credentials
      env:
        - name: JOB_TYPE
          value: $(params.job-type)
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        # Skip port forwarding for periodic-stage jobs (they use remote stage environment)
        if [[ "${JOB_TYPE}" == "periodic-stage" ]]; then
          echo "Skipping port forward setup for periodic-stage job"
          exit 0
        fi

        # Check if kubeconfig exists
        if [[ ! -f /credentials/kubeconfig ]]; then
          echo "WARNING: kubeconfig not found, skipping port forward"
          echo "This is expected for periodic-stage jobs"
          exit 0
        fi

        export KUBECONFIG=/credentials/kubeconfig

        echo "Setting up port forward to Konflux UI in Kind cluster..."

        # List namespaces for debugging
        echo "Available namespaces in Kind cluster:"
        kubectl get namespaces

        # Wait for Konflux UI proxy deployment to be ready
        echo "Waiting for Konflux UI proxy deployment in konflux-ui namespace..."
        kubectl wait --for=condition=available --timeout=300s deployment/proxy -n konflux-ui || {
          echo "ERROR: Konflux UI proxy deployment not ready"
          echo "Checking pods in konflux-ui namespace:"
          kubectl get pods -n konflux-ui
          echo "Checking deployment:"
          kubectl get deployment proxy -n konflux-ui
          exit 1
        }

        echo ""
        echo "=========================================="
        echo "DEBUGGING INFORMATION - Konflux UI Access"
        echo "=========================================="
        echo ""

        # Get service information
        echo "=== Service Information ==="
        kubectl get svc proxy -n konflux-ui -o wide
        echo ""

        SVC_TYPE=$(kubectl get svc proxy -n konflux-ui -o jsonpath='{.spec.type}')
        SVC_CLUSTER_IP=$(kubectl get svc proxy -n konflux-ui -o jsonpath='{.spec.clusterIP}')
        SVC_PORTS=$(kubectl get svc proxy -n konflux-ui -o jsonpath='{.spec.ports[*].port}')
        SVC_TARGET_PORTS=$(kubectl get svc proxy -n konflux-ui -o jsonpath='{.spec.ports[*].targetPort}')

        echo "Service Type: ${SVC_TYPE}"
        echo "Service ClusterIP: ${SVC_CLUSTER_IP}"
        echo "Service Ports: ${SVC_PORTS}"
        echo "Service TargetPorts: ${SVC_TARGET_PORTS}"
        echo ""

        # Get deployment/pod information
        echo "=== Deployment/Pod Information ==="
        kubectl get deployment proxy -n konflux-ui -o wide
        echo ""
        kubectl get pods -n konflux-ui -l app.kubernetes.io/name=proxy -o wide 2>/dev/null || kubectl get pods -n konflux-ui -o wide
        echo ""

        # Get pod name
        POD_NAME=$(kubectl get pod -n konflux-ui -l app.kubernetes.io/name=proxy -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "")

        if [[ -z "${POD_NAME}" ]]; then
          # Try without label selector
          POD_NAME=$(kubectl get pod -n konflux-ui -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "")
        fi

        if [[ -z "${POD_NAME}" ]]; then
          echo "ERROR: Could not find proxy pod"
          kubectl get pods -n konflux-ui
          exit 1
        fi

        echo "Selected Pod: ${POD_NAME}"
        POD_IP=$(kubectl get pod ${POD_NAME} -n konflux-ui -o jsonpath='{.status.podIP}')
        echo "Pod IP: ${POD_IP}"
        echo ""

        # Get container port information
        echo "=== Container Port Configuration ==="
        echo "All containers and their ports:"
        kubectl get pod ${POD_NAME} -n konflux-ui -o jsonpath='{range .spec.containers[*]}{.name}{"\n"}{.ports}{"\n\n"}{end}' | head -20
        echo ""

        # The proxy pod has multiple containers (nginx, oauth2-proxy)
        # We need to forward to the SERVICE, not directly to a container port
        # The service will route to the correct container

        # Get service port and targetPort
        echo "=== Determining Correct Port for Port-Forward ==="

        # Get full service YAML to understand port mapping
        echo "Full service configuration:"
        kubectl get svc proxy -n konflux-ui -o yaml | grep -A 10 "ports:"

        echo ""

        # Get the first service port (usually the HTTP port)
        SERVICE_PORT=$(kubectl get svc proxy -n konflux-ui -o jsonpath='{.spec.ports[0].port}')
        SERVICE_TARGET_PORT=$(kubectl get svc proxy -n konflux-ui -o jsonpath='{.spec.ports[0].targetPort}')

        echo "Service Port: ${SERVICE_PORT}"
        echo "Service TargetPort (named): ${SERVICE_TARGET_PORT}"

        # The issue: oauth2-proxy listens on port 6000, nginx on 8080/9443
        # Service might be routing to wrong container
        # Let's try to find the oauth2-proxy container port

        OAUTH2_PROXY_PORT=$(kubectl get pod ${POD_NAME} -n konflux-ui -o jsonpath='{.spec.containers[?(@.name=="oauth2-proxy")].ports[0].containerPort}')
        echo "OAuth2-Proxy container port (from spec): ${OAUTH2_PROXY_PORT}"

        echo ""
        echo "=== Checking Actual Listening Ports in Pod ==="
        echo "Running 'ss -tln' inside pod to see what's actually listening..."
        kubectl exec ${POD_NAME} -n konflux-ui -c nginx -- ss -tln 2>/dev/null | grep LISTEN || echo "Could not run ss in nginx container"
        echo ""
        kubectl exec ${POD_NAME} -n konflux-ui -c oauth2-proxy -- ss -tln 2>/dev/null | grep LISTEN || echo "Could not run ss in oauth2-proxy container"
        echo ""

        echo "NOTE: This pod has multiple containers (nginx + oauth2-proxy)."
        echo "Based on the listening ports above, we need to forward to the correct port."
        echo "Typically oauth2-proxy listens on port ${OAUTH2_PROXY_PORT}."
        echo ""

        # Show all available access methods
        echo "=== Available Access Methods ==="
        echo "1. From within Kind cluster:"
        SERVICE_HTTP_URL="http://${SVC_CLUSTER_IP}:${SERVICE_PORT}"
        SERVICE_HTTPS_URL="https://${SVC_CLUSTER_IP}:9443"
        echo "   - Service URL (HTTP): ${SERVICE_HTTP_URL}"
        echo "   - Service URL (HTTPS): ${SERVICE_HTTPS_URL}"
        echo "   - Pod oauth2-proxy: http://${POD_IP}:${OAUTH2_PROXY_PORT}"
        echo ""
        echo "2. Via port-forward (what we're setting up):"
        LOCAL_PORT=8080
        echo "   - Will forward localhost:${LOCAL_PORT} -> pod/${POD_NAME}:${OAUTH2_PROXY_PORT} (oauth2-proxy)"
        echo ""

        # Save Service URLs to task results for use in run-e2e-test step
        echo -n "${SERVICE_HTTP_URL}" > $(results.service-url.path)
        echo -n "${SERVICE_HTTPS_URL}" > $(results.service-https-url.path)
        echo "Service URLs saved to task results"
        echo ""

        # Start port forward to the oauth2-proxy container port directly
        # The service routing seems to be broken, so we bypass it
        echo "=== Starting Port Forward ==="
        echo "Command: kubectl port-forward -n konflux-ui pod/${POD_NAME} ${LOCAL_PORT}:${OAUTH2_PROXY_PORT}"
        kubectl port-forward -n konflux-ui pod/${POD_NAME} ${LOCAL_PORT}:${OAUTH2_PROXY_PORT} &
        PORT_FORWARD_PID=$!
        echo "Port forward started with PID: ${PORT_FORWARD_PID}"
        echo ""

        # Save PID for cleanup (store in a shared location)
        echo ${PORT_FORWARD_PID} > /tmp/port-forward-pid

        # Wait for port forward to establish
        echo "Waiting for port forward to establish..."
        sleep 5

        # First, test if the oauth2-proxy is accessible directly (bypassing service)
        echo "=== Testing OAuth2-Proxy Accessibility from Kind Cluster ==="
        echo "Testing http://${POD_IP}:${OAUTH2_PROXY_PORT} (oauth2-proxy direct)..."

        # Use timeout to prevent hanging, and capture errors
        OAUTH2_TEST_RESULT=$(timeout 10 curl -s -o /dev/null -w "%{http_code}" --connect-timeout 5 --max-time 10 http://${POD_IP}:${OAUTH2_PROXY_PORT} 2>&1 || echo "000")
        echo "HTTP Response Code: ${OAUTH2_TEST_RESULT}"

        if [[ "${OAUTH2_TEST_RESULT}" =~ ^(200|301|302|304|401|403|404)$ ]]; then
          echo "✓ OAuth2-Proxy is accessible!"
        else
          echo "✗ WARNING: OAuth2-Proxy may not be accessible"
          echo "Response: ${OAUTH2_TEST_RESULT}"

          echo ""
          echo "Testing Service endpoint: http://${SVC_CLUSTER_IP}:${SERVICE_PORT} ..."
          SERVICE_TEST_RESULT=$(timeout 10 curl -s -o /dev/null -w "%{http_code}" --connect-timeout 5 --max-time 10 http://${SVC_CLUSTER_IP}:${SERVICE_PORT} 2>&1 || echo "000")
          echo "Service HTTP Response Code: ${SERVICE_TEST_RESULT}"

          echo ""
          echo "This could indicate the service itself is not working correctly."
          echo ""
          echo "Checking pod status:"
          kubectl get pods ${POD_NAME} -n konflux-ui -o wide
          echo ""
          echo "Checking all containers in pod:"
          kubectl get pods ${POD_NAME} -n konflux-ui -o jsonpath='{.spec.containers[*].name}' && echo
          echo ""
          echo "Checking container logs (nginx):"
          kubectl logs ${POD_NAME} -n konflux-ui -c nginx --tail=30 2>&1 || echo "Could not get nginx logs"
          echo ""
          echo "Checking container logs (oauth2-proxy):"
          kubectl logs ${POD_NAME} -n konflux-ui -c oauth2-proxy --tail=30 2>&1 || echo "Could not get oauth2-proxy logs"
          echo ""
          echo "Describing pod:"
          kubectl describe pod ${POD_NAME} -n konflux-ui | tail -50
        fi
        echo ""

        # Verify port forward with retry logic
        echo "=== Verifying Port Forward ==="
        echo "Testing connection to localhost:${LOCAL_PORT}..."
        MAX_RETRIES=12
        RETRY_COUNT=0
        PORT_FORWARD_READY=false

        while [[ ${RETRY_COUNT} -lt ${MAX_RETRIES} ]]; do
          RETRY_COUNT=$((RETRY_COUNT + 1))
          echo "Attempt ${RETRY_COUNT}/${MAX_RETRIES}: Testing connection..."

          # Try HTTPS
          HTTPS_CODE=$(curl -k -s -o /dev/null -w "%{http_code}" https://localhost:${LOCAL_PORT} 2>/dev/null || echo "000")
          if [[ "${HTTPS_CODE}" =~ ^(200|301|302|304|401|403|404)$ ]]; then
            echo "✓ Port forward is working! (HTTPS ${HTTPS_CODE})"
            echo "✓ Access URL: https://localhost:${LOCAL_PORT}"
            PORT_FORWARD_READY=true
            break
          fi

          # Try HTTP
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:${LOCAL_PORT} 2>/dev/null || echo "000")
          if [[ "${HTTP_CODE}" =~ ^(200|301|302|304|401|403|404)$ ]]; then
            echo "✓ Port forward is working! (HTTP ${HTTP_CODE})"
            echo "✓ Access URL: http://localhost:${LOCAL_PORT}"
            PORT_FORWARD_READY=true
            break
          fi

          echo "Not ready yet (HTTP: ${HTTP_CODE}, HTTPS: ${HTTPS_CODE}), waiting 5 seconds..."
          sleep 5
        done

        echo ""
        echo "=========================================="
        echo "PORT FORWARD VERIFICATION RESULT"
        echo "=========================================="

        if [[ "${PORT_FORWARD_READY}" == "true" ]]; then
          echo "✓ SUCCESS: Port forward is working!"
          echo ""
          echo "You can access Konflux UI at:"
          echo "  - http://localhost:${LOCAL_PORT}"
          echo "  - https://localhost:${LOCAL_PORT} (if HTTPS is configured)"
          echo ""
        else
          echo "✗ FAILED: Port forward verification failed after ${MAX_RETRIES} attempts"
          echo ""
          echo "Debugging information:"
          echo ""
          echo "Port forward process status:"
          ps aux | grep "[p]ort-forward" || echo "Port forward process not found"
          echo ""
          echo "Checking if port ${LOCAL_PORT} is listening:"
          netstat -tuln 2>/dev/null | grep ":${LOCAL_PORT}" || ss -tuln 2>/dev/null | grep ":${LOCAL_PORT}" || echo "Port ${LOCAL_PORT} not listening"
          echo ""
          echo "Testing connection with verbose curl:"
          timeout 5 curl -v http://localhost:${LOCAL_PORT} 2>&1 | head -30 || true
          echo ""
          echo "Checking pod logs:"
          kubectl logs ${POD_NAME} -n konflux-ui --tail=50 || true
          echo ""
          echo "ERROR: Cannot proceed with E2E tests - Konflux UI is not accessible"
          exit 1
        fi

        # Debug pause (configurable)
        DEBUG_PAUSE_MINUTES=$(params.debug-pause-minutes)

        if [[ "${DEBUG_PAUSE_MINUTES}" -gt 0 ]]; then
          echo ""
          echo "=========================================="
          echo "MANUAL TESTING PAUSE - ${DEBUG_PAUSE_MINUTES} MINUTES"
          echo "=========================================="
          echo ""
          echo "Pausing for ${DEBUG_PAUSE_MINUTES} minutes to allow manual testing..."
          echo "During this time, you can:"
          echo "  1. Access Konflux UI at: http://localhost:${LOCAL_PORT}"
          echo "  2. Run Cypress tests locally with: CYPRESS_BASE_URL=http://localhost:${LOCAL_PORT}"
          echo "  3. Check the Kind cluster with kubectl commands"
          echo ""
          echo "Port forward will remain active during this pause."
          echo "Started at: $(date)"
          echo ""

          # Sleep for specified minutes
          for i in $(seq 1 ${DEBUG_PAUSE_MINUTES}); do
            echo "Minute ${i}/${DEBUG_PAUSE_MINUTES} elapsed..."
            sleep 60
          done

          echo ""
          echo "Manual testing pause completed. Continuing with automated E2E tests..."
          echo ""
        else
          echo "Debug pause disabled (debug-pause-minutes=0), proceeding directly to E2E tests..."
        fi
    - name: run-e2e-test
      image: quay.io/konflux_ui_qe/konflux-ui-tests:latest
      workingDir: /tmp/e2e
      volumeMounts:
        - name: source
          mountPath: /workspace/source
        - name: kubeconfig
          mountPath: /credentials
      env:
        - name: JOB_SPEC
          value: $(params.job-spec)
        - name: JOB_TYPE
          value: $(params.job-type)
        - name: CYPRESS_LOCAL_CLUSTER
          value: "true"
        - name: CYPRESS_PERIODIC_RUN_STAGE
          value: "false"
        - name: CYPRESS_USERNAME
          valueFrom:
            secretKeyRef:
              name: $(params.cypress-credentials-secret)
              key: username
        - name: CYPRESS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: $(params.cypress-credentials-secret)
              key: password
        - name: GH_TOKEN
          valueFrom:
            secretKeyRef:
              name: $(params.github-credentials-secret)
              key: token
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        echo "Running Cypress E2E tests"
        echo "Job Type: ${JOB_TYPE}"

        # Debug: Check if GH_TOKEN is set
        if [[ -z "${GH_TOKEN:-}" ]]; then
          echo "ERROR: GH_TOKEN is not set!"
          exit 1
        else
          echo "GH_TOKEN is set (length: ${#GH_TOKEN})"
        fi

        # Determine test configuration based on job type
        if [[ ${JOB_TYPE} == 'periodic-stage' ]]; then
          echo "Running test suite against stage backend..."
          export CYPRESS_LOCAL_CLUSTER=false
          export CYPRESS_PERIODIC_RUN_STAGE=true
        else
          echo "Running test suite against local Konflux UI in kind cluster"

          # Set up kubeconfig to access Kind cluster
          if [[ -f /credentials/kubeconfig ]]; then
            export KUBECONFIG=/credentials/kubeconfig
            echo "Using kubeconfig from /credentials/kubeconfig"

            # Verify kubeconfig works
            echo "Verifying access to Kind cluster..."
            if kubectl get svc proxy -n konflux-ui >/dev/null 2>&1; then
              echo "✓ Successfully connected to Kind cluster"
              kubectl get svc proxy -n konflux-ui -o wide
            else
              echo "ERROR: Cannot access Kind cluster Service"
              exit 1
            fi

            # Set up port-forward from this container to Kind cluster
            echo ""
            echo "=== Setting up port-forward to Kind cluster ==="

            # Get Service port
            SERVICE_PORT=$(kubectl get svc proxy -n konflux-ui -o jsonpath='{.spec.ports[0].port}')
            LOCAL_PORT=8080

            echo "Starting port-forward: localhost:${LOCAL_PORT} -> svc/proxy:${SERVICE_PORT}"
            kubectl port-forward -n konflux-ui svc/proxy ${LOCAL_PORT}:${SERVICE_PORT} &
            PORT_FORWARD_PID=$!
            echo "Port forward PID: ${PORT_FORWARD_PID}"

            # Wait for port-forward to be ready
            echo "Waiting for port-forward to establish..."
            sleep 5

            # Test port-forward
            MAX_RETRIES=6
            RETRY_COUNT=0
            PORT_FORWARD_READY=false

            while [[ ${RETRY_COUNT} -lt ${MAX_RETRIES} ]]; do
              RETRY_COUNT=$((RETRY_COUNT + 1))
              echo "Testing connection (attempt ${RETRY_COUNT}/${MAX_RETRIES})..."

              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:${LOCAL_PORT} 2>/dev/null || echo "000")
              if [[ "${HTTP_CODE}" =~ ^(200|301|302|304|401|403|404)$ ]]; then
                echo "✓ Port forward is working! (HTTP ${HTTP_CODE})"
                PORT_FORWARD_READY=true
                break
              fi

              echo "Not ready yet (HTTP: ${HTTP_CODE}), waiting 3 seconds..."
              sleep 3
            done

            if [[ "${PORT_FORWARD_READY}" == "true" ]]; then
              echo "✓ SUCCESS: Port forward to Kind cluster is ready"
              export CYPRESS_BASE_URL="http://localhost:${LOCAL_PORT}"
            else
              echo "✗ ERROR: Port forward failed after ${MAX_RETRIES} attempts"
              exit 1
            fi
          else
            echo "WARNING: kubeconfig not found, using default localhost:8080"
            export CYPRESS_BASE_URL="https://localhost:8080"
          fi
        fi

        # Run Cypress tests (test code is in /tmp/e2e in the image)
        SPEC_FILE="tests/basic-happy-path.spec.ts"
        echo "Running tests from ${SPEC_FILE}"
        echo "CYPRESS_BASE_URL: ${CYPRESS_BASE_URL:-not set}"

        # Run Cypress with environment variables passed via --env flag
        # Cypress automatically picks up CYPRESS_* variables, but GH_TOKEN needs to be explicit
        npx cypress run -b chrome --spec "${SPEC_FILE}" --env "GH_TOKEN=${GH_TOKEN}" || EXIT_CODE=$?

        # Store the exit code
        EXIT_CODE=${EXIT_CODE:-0}
        echo ${EXIT_CODE} > /tmp/e2e-exit-code
        exit ${EXIT_CODE}

    - name: report-to-slack
      image: quay.io/konflux-ci/appstudio-utils:ab6b0b8e40e440158e7288c73aff1cf83a2cc8a9@sha256:24179f0efd06c65d16868c2d7eb82573cce8e43533de6cea14fec3b7446e0b14
      env:
        - name: JOB_TYPE
          value: $(params.job-type)
        - name: SLACK_TOKEN
          valueFrom:
            secretKeyRef:
              name: $(params.slack-credentials-secret)
              key: token
              optional: true
        - name: SLACK_CHANNEL_ID
          valueFrom:
            configMapKeyRef:
              name: slack-config
              key: channel-id
              optional: true
        - name: PIPELINE_RUN_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.labels['tekton.dev/pipelineRun']
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
      script: |
        #!/usr/bin/env bash

        # Only send Slack report for periodic jobs
        if [[ ! ${JOB_TYPE} == periodic* ]]; then
          echo "Not a periodic job (JOB_TYPE=${JOB_TYPE}), skipping Slack report"
          exit 0
        fi

        # Check if Slack is configured
        if [[ -z "${SLACK_TOKEN}" || -z "${SLACK_CHANNEL_ID}" ]]; then
          echo "Slack not configured, skipping report"
          exit 0
        fi

        # Determine test outcome
        E2E_OUTCOME="success"
        if [[ -f /tmp/e2e-exit-code ]] && [[ $(cat /tmp/e2e-exit-code) -ne 0 ]]; then
          E2E_OUTCOME="failure"
        fi

        # Generate message
        if [[ $E2E_OUTCOME == "success" ]]; then
          ICON=":white_check_mark:"
        else
          ICON=":x:"
        fi

        DATE_STR=$(date '+%b %-d')

        case "$JOB_TYPE" in
          "periodic-local")
            JOB_DESC="LOCAL Periodic job"
            ;;
          "periodic-stage")
            JOB_DESC="STAGE Periodic job"
            ;;
          "periodic-cleanup")
            JOB_DESC="CLEANUP Periodic job"
            ;;
          *)
            JOB_DESC="Periodic job (${JOB_TYPE})"
            ;;
        esac

        # Add PipelineRun info to message
        if [[ -n "${PIPELINE_RUN_NAME}" ]]; then
          MESSAGE="${ICON} Report ${DATE_STR}: ${JOB_DESC} (PipelineRun: ${PIPELINE_RUN_NAME})"
        else
          MESSAGE="${ICON} Report ${DATE_STR}: ${JOB_DESC}"
        fi

        echo "Sending Slack notification: ${MESSAGE}"

        # Send to Slack
        curl -X POST https://slack.com/api/chat.postMessage \
          -H "Authorization: Bearer ${SLACK_TOKEN}" \
          -H "Content-Type: application/json; charset=utf-8" \
          -d "{\"channel\": \"${SLACK_CHANNEL_ID}\", \"text\": \"${MESSAGE}\"}" \
          || echo "Failed to send Slack notification (non-fatal)"
