apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: run-e2e-konflux-ui
  annotations:
    tekton.dev/displayName: 'konflux-ui-e2e-tests'
    tekton.dev/categories: 'Pipeline'
    tekton.dev/tags: 'e2e,cypress,konflux-ui'
spec:
  description: >-
    A clean, native Tekton Task to run Konflux UI E2E tests. 
    No Podman, no sidecars, no OCI overhead.
  params:
    - name: job-type
      type: string
      default: 'pr-check'
    - name: cluster-access-secret
      type: string
      description: 'Secret name containing kubeconfig for the Kind cluster'
      default: ''
    - name: cypress-credentials-secret
      type: string
      default: 'cypress-credentials'
    - name: github-credentials-secret
      type: string
      default: 'github-credentials'
    - name: spec-file
      type: string
      default: 'tests/basic-happy-path.spec.ts'
  volumes:
    - name: kubeconfig
      secret:
        secretName: $(params.cluster-access-secret)
        optional: true
    - name: dshm
      emptyDir:
        medium: Memory
  steps:
    - name: run-e2e-test
      image: quay.io/konflux_ui_qe/konflux-ui-tests:latest
      workingDir: /tmp/e2e
      resources:
        limits:
          memory: 8Gi
          cpu: '2'
        requests:
          memory: 8Gi
          cpu: '1'
      volumeMounts:
        - name: kubeconfig
          mountPath: /credentials
          readOnly: true
        - name: dshm
          mountPath: /dev/shm
      env:
        - name: KUBECONFIG
          value: /credentials/kubeconfig
        - name: CYPRESS_USERNAME
          valueFrom:
            secretKeyRef:
              name: $(params.cypress-credentials-secret)
              key: username
        - name: CYPRESS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: $(params.cypress-credentials-secret)
              key: password
        - name: CYPRESS_GH_TOKEN
          valueFrom:
            secretKeyRef:
              name: $(params.github-credentials-secret)
              key: token
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        echo "=== 1. Target URL Discovery ==="
        //  if [[ -f "$KUBECONFIG" ]]; then
        //   echo "Kubeconfig detected, searching for Konflux UI service..."
        //    NODE_IP=$(kubectl get nodes -o jsonpath='{.items[0].status.addresses[?(@.type=="ExternalIP")].address}' 2>/dev/null || echo "3.139.24.102")
        //    NODE_PORT=$(kubectl get svc proxy -n konflux-ui -o jsonpath='{.spec.ports[?(@.name=="web-tls")].nodePort}' 2>/dev/null || echo "9443")
        //    export CYPRESS_KONFLUX_BASE_URL="https://${NODE_IP}:${NODE_PORT}"
        // else
        echo "Kubeconfig not found, falling back to default URL..."
        export CYPRESS_KONFLUX_BASE_URL="https://18.119.225.133:9443"
        //fi
        echo "✓ Base URL set to: ${CYPRESS_KONFLUX_BASE_URL}"

        echo "=== 2. Display Setup ==="
        if command -v Xvfb &> /dev/null; then
          echo "Starting Xvfb on DISPLAY :99..."
          Xvfb :99 -screen 0 1280x1024x24 &
          export DISPLAY=:99
          sleep 3 
        else
          echo "WARNING: Xvfb not found in image, browser may fail to start."
        fi

        echo "=== 3. Execution ==="
        npx cypress run \
          --browser chrome \
          --spec "$(params.spec-file)" \
          --config video=false,screenshot=false,numTestsKeptInMemory=0 \
          --project . \
          -- --args "--no-sandbox --disable-dev-shm-usage --no-zygote --disable-gpu --disable-software-rasterizer"

        echo "✓ E2E Tests completed successfully."
