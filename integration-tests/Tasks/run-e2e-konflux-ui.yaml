---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: run-e2e-konflux-ui
  annotations:
    tekton.dev/displayName: 'konflux-ui-e2e-tests'
    tekton.dev/categories: 'Pipeline'
    tekton.dev/tags: 'e2e,cypress,konflux-ui'
spec:
  description: >-
    Runs E2E tests for Konflux UI using Cypress
  params:
    - name: job-spec
      description: 'Job specification metadata'
      type: string
    - name: job-type
      description: 'Type of job (e.g., periodic-stage, periodic, pr)'
      type: string
      default: ""
    - name: git-url
      description: 'Git repository URL'
      type: string
    - name: git-revision
      description: 'Git revision to checkout'
      type: string
      default: "main"
    - name: cypress-credentials-secret
      description: 'Secret name containing Cypress credentials (username, password)'
      type: string
      default: "cypress-credentials"
    - name: slack-credentials-secret
      description: 'Secret name containing Slack credentials'
      type: string
      default: "slack-credentials"
    - name: github-credentials-secret
      description: 'Secret name containing GitHub token'
      type: string
      default: "github-credentials"
    - name: cluster-access-secret
      description: 'Secret name containing kubeconfig for accessing Kind cluster'
      type: string
      default: ""
    - name: cypress-cloud-secret
      description: 'Secret name containing Cypress Cloud credentials (project-id, record-key)'
      type: string
      default: "cypress-cloud-credentials"
  results:
    - name: e2e-output
      description: 'Result of e2e test'
  volumes:
    - name: kubeconfig
      secret:
        secretName: $(params.cluster-access-secret)
        optional: true
    - name: shared-data
      emptyDir: {}
    - name: test-artifacts
      emptyDir: {}
  sidecars:
    - name: port-forward
      image: quay.io/konflux-ci/appstudio-utils:ab6b0b8e40e440158e7288c73aff1cf83a2cc8a9@sha256:24179f0efd06c65d16868c2d7eb82573cce8e43533de6cea14fec3b7446e0b14
      volumeMounts:
        - name: kubeconfig
          mountPath: /credentials
        - name: shared-data
          mountPath: /shared
      env:
        - name: JOB_TYPE
          value: $(params.job-type)
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        echo "=========================================="
        echo "PORT FORWARD SIDECAR - DEBUG INFO"
        echo "=========================================="
        echo ""
        echo "Environment:"
        echo "  JOB_TYPE: ${JOB_TYPE}"
        echo "  Task parameter cluster-access-secret: $(params.cluster-access-secret)"
        echo ""

        echo "=== Checking /credentials directory ==="
        if [[ -d /credentials ]]; then
          echo "Directory exists. Contents:"
          ls -laR /credentials/ || echo "Cannot list /credentials"
        else
          echo "ERROR: /credentials directory does not exist!"
        fi
        echo ""

        echo "=== Checking kubeconfig file ==="
        if [[ -f /credentials/kubeconfig ]]; then
          echo "✓ Found /credentials/kubeconfig"
          ls -lh /credentials/kubeconfig
          echo "File size: $(wc -c < /credentials/kubeconfig) bytes"
          echo "First 5 lines:"
          head -5 /credentials/kubeconfig || echo "Cannot read file"
        else
          echo "✗ /credentials/kubeconfig NOT FOUND"
          echo ""
          echo "=== Troubleshooting Info ==="
          echo "Listing all files in /credentials:"
          find /credentials -type f 2>/dev/null || echo "No files found"
          echo ""
          echo "Checking if kubectl is available:"
          which kubectl || echo "kubectl not found in PATH"
          echo ""
          echo "Attempting to list secrets in current namespace (if possible):"
          # Try to use default service account token
          if [[ -f /var/run/secrets/kubernetes.io/serviceaccount/token ]]; then
            echo "Found service account token, trying to list secrets..."
            NAMESPACE=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)
            echo "Current namespace: ${NAMESPACE}"
            TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
            CA_CERT=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt

            echo ""
            echo "Secrets starting with 'kfg-' in namespace ${NAMESPACE}:"
            curl -s --cacert ${CA_CERT} -H "Authorization: Bearer ${TOKEN}" \
              "https://kubernetes.default.svc/api/v1/namespaces/${NAMESPACE}/secrets" \
              | grep -o '"name":"kfg-[^"]*"' | cut -d'"' -f4 || echo "Failed to list secrets"
          else
            echo "No service account token available"
          fi
        fi
        echo ""

        # Skip port forwarding for periodic-stage jobs
        if [[ "${JOB_TYPE}" == "periodic-stage" ]]; then
          echo "INFO: Skipping port forward for periodic-stage job"
          echo "skipped" > /shared/port-forward-status
          sleep infinity
          exit 0
        fi

        # Check if kubeconfig exists
        if [[ ! -f /credentials/kubeconfig ]]; then
          echo "=========================================="
          echo "ERROR: Cannot proceed without kubeconfig"
          echo "=========================================="
          echo ""
          echo "The kubeconfig file is missing. This means:"
          echo ""
          echo "1. The secret specified in 'cluster-access-secret' parameter doesn't exist, OR"
          echo "2. The secret exists but doesn't have a 'kubeconfig' key, OR"
          echo "3. The volume mount failed"
          echo ""
          echo "Expected secret name: $(params.cluster-access-secret)"
          echo ""
          echo "Next steps:"
          echo "  1. Check IntegrationTestScenario has 'cluster-kubeconfig-secret' parameter set"
          echo "  2. Run: oc get secret <secret-name> -n <namespace>"
          echo "  3. Verify secret has 'kubeconfig' key: oc get secret <secret-name> -o jsonpath='{.data.kubeconfig}'"
          echo ""
          sleep infinity
          exit 1
        fi

        export KUBECONFIG=/credentials/kubeconfig
        echo "✓ KUBECONFIG set to: ${KUBECONFIG}"
        echo ""

        echo "=== Port Forward Sidecar Starting ==="
        echo "Waiting for Konflux UI deployment to be ready..."

        # Wait for deployment
        kubectl wait --for=condition=available --timeout=300s deployment/proxy -n konflux-ui || {
          echo "ERROR: Konflux UI proxy deployment not ready"
          kubectl get pods -n konflux-ui
          exit 1
        }

        echo "✓ Deployment is ready"

        # Get service and pod info
        kubectl get svc proxy -n konflux-ui -o wide
        echo ""

        # Get pod name
        POD_NAME=$(kubectl get pod -n konflux-ui -l app=proxy -o jsonpath='{.items[0].metadata.name}')
        if [[ -z "${POD_NAME}" ]]; then
          echo "ERROR: Could not find proxy pod"
          kubectl get pods -n konflux-ui
          exit 1
        fi

        echo "Found pod: ${POD_NAME}"
        echo ""

        # Get detailed pod information
        echo "=== Pod Details ==="
        kubectl get pod ${POD_NAME} -n konflux-ui -o wide
        echo ""

        echo "=== Container Ports Configuration ==="
        kubectl get pod ${POD_NAME} -n konflux-ui -o jsonpath='{range .spec.containers[*]}Container: {.name}{"\n"}{range .ports[*]}  - {.name}: {.containerPort}/{.protocol}{"\n"}{end}{"\n"}{end}'
        echo ""

        # Get nginx container ports
        NGINX_HTTP_PORT=$(kubectl get pod ${POD_NAME} -n konflux-ui -o jsonpath='{.spec.containers[?(@.name=="nginx")].ports[?(@.name=="web")].containerPort}')
        NGINX_HTTPS_PORT=$(kubectl get pod ${POD_NAME} -n konflux-ui -o jsonpath='{.spec.containers[?(@.name=="nginx")].ports[?(@.name=="web-tls")].containerPort}')

        echo "Nginx HTTP port (web): ${NGINX_HTTP_PORT}"
        echo "Nginx HTTPS port (web-tls): ${NGINX_HTTPS_PORT}"
        echo ""

        # Check what's actually listening inside the pod
        echo "=== Checking Listening Ports in Pod ==="
        echo "Running 'ss -tln' in nginx container:"
        kubectl exec ${POD_NAME} -n konflux-ui -c nginx -- ss -tln 2>/dev/null | grep LISTEN || echo "Could not run ss"
        echo ""

        echo "Running 'ss -tln' in oauth2-proxy container:"
        kubectl exec ${POD_NAME} -n konflux-ui -c oauth2-proxy -- ss -tln 2>/dev/null | grep LISTEN || echo "Could not run ss"
        echo ""

        # Test connectivity from within the cluster
        echo "=== Testing Pod Connectivity from Cluster ==="
        POD_IP=$(kubectl get pod ${POD_NAME} -n konflux-ui -o jsonpath='{.status.podIP}')
        echo "Pod IP: ${POD_IP}"

        echo "Testing HTTP to pod IP:${NGINX_HTTP_PORT}..."
        HTTP_TEST=$(timeout 5 kubectl exec ${POD_NAME} -n konflux-ui -c nginx -- curl -s -o /dev/null -w "%{http_code}" http://localhost:${NGINX_HTTP_PORT} 2>&1 || echo "failed")
        echo "  Result: ${HTTP_TEST}"

        echo "Testing HTTPS to pod IP:${NGINX_HTTPS_PORT}..."
        HTTPS_TEST=$(timeout 5 kubectl exec ${POD_NAME} -n konflux-ui -c nginx -- curl -k -s -o /dev/null -w "%{http_code}" https://localhost:${NGINX_HTTPS_PORT} 2>&1 || echo "failed")
        echo "  Result: ${HTTPS_TEST}"
        echo ""

        # Start port forward to nginx container's HTTPS port (9443)
        # We use HTTPS because nginx definitely listens on 9443
        echo "=========================================="
        echo "STARTING PORT FORWARD"
        echo "=========================================="
        echo "Command: kubectl port-forward -n konflux-ui pod/${POD_NAME} 8080:${NGINX_HTTPS_PORT}"
        echo "This will forward:"
        echo "  localhost:8080 (in this sidecar) -> pod ${POD_NAME}:${NGINX_HTTPS_PORT} (nginx HTTPS)"
        echo ""
        echo "Port forward starting in background..."

        # Start port-forward in background
        kubectl port-forward -n konflux-ui pod/${POD_NAME} 8080:${NGINX_HTTPS_PORT} &
        PF_PID=$!

        echo "Port-forward process started with PID: ${PF_PID}"

        # Wait for port-forward to be ready
        echo "Waiting for port-forward to be ready..."
        MAX_WAIT=30
        ELAPSED=0
        while [[ ${ELAPSED} -lt ${MAX_WAIT} ]]; do
          # Use HTTPS with -k to ignore cert, since we're forwarding to port 9443 (HTTPS)
          HTTP_CODE=$(curl -k -s -o /dev/null -w "%{http_code}" https://localhost:8080 2>/dev/null || echo "000")
          echo "  Attempt $((ELAPSED + 1)): HTTP code = ${HTTP_CODE}"
          if echo "${HTTP_CODE}" | grep -qE "^(200|301|302|304|401|403|404)$"; then
            echo "✓ Port-forward is ready!"
            break
          fi
          sleep 1
          ELAPSED=$((ELAPSED + 1))
        done

        if [[ ${ELAPSED} -ge ${MAX_WAIT} ]]; then
          echo "ERROR: Port-forward not ready after ${MAX_WAIT}s"
          echo "Last HTTP code: ${HTTP_CODE}"
          echo "failed" > /shared/port-forward-status
          exit 1
        fi

        # Signal that port-forward is ready
        echo "ready" > /shared/port-forward-status
        echo "✓ Readiness marker created at /shared/port-forward-status"

        # Keep sidecar alive by waiting for the port-forward process
        echo "Port-forward is running. Waiting for process to complete..."
        wait $PF_PID
  steps:
    - name: run-e2e-test
      image: quay.io/konflux_ui_qe/konflux-ui-tests:latest
      workingDir: /tmp/e2e
      volumeMounts:
        - name: shared-data
          mountPath: /shared
      env:
        - name: JOB_SPEC
          value: $(params.job-spec)
        - name: JOB_TYPE
          value: $(params.job-type)
        - name: CYPRESS_LOCAL_CLUSTER
          value: "true"
        - name: CYPRESS_PERIODIC_RUN_STAGE
          value: "false"
        - name: CYPRESS_USERNAME
          valueFrom:
            secretKeyRef:
              name: $(params.cypress-credentials-secret)
              key: username
        - name: CYPRESS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: $(params.cypress-credentials-secret)
              key: password
        - name: CYPRESS_GH_TOKEN
          valueFrom:
            secretKeyRef:
              name: $(params.github-credentials-secret)
              key: token
        - name: CYPRESS_PROJECT_ID
          valueFrom:
            secretKeyRef:
              name: $(params.cypress-cloud-secret)
              key: project-id
              optional: true
        - name: CYPRESS_RECORD_KEY
          valueFrom:
            secretKeyRef:
              name: $(params.cypress-cloud-secret)
              key: record-key
              optional: true
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        echo "=== Running Cypress E2E Tests ==="
        echo "Job Type: ${JOB_TYPE}"

        # Verify CYPRESS_GH_TOKEN
        if [[ -z "${CYPRESS_GH_TOKEN:-}" ]]; then
          echo "ERROR: CYPRESS_GH_TOKEN is not set!"
          exit 1
        fi
        echo "✓ CYPRESS_GH_TOKEN is set (length: ${#CYPRESS_GH_TOKEN})"

        # Configure based on job type
        if [[ ${JOB_TYPE} == 'periodic-stage' ]]; then
          echo "Running against stage environment..."
          export CYPRESS_LOCAL_CLUSTER=false
          export CYPRESS_PERIODIC_RUN_STAGE=true
        else
          echo "Running against local Kind cluster..."

          # Wait for port-forward sidecar to be ready using shared marker file
          echo "Waiting for port-forward sidecar readiness marker..."
          MAX_WAIT=60
          ELAPSED=0

          while [[ ${ELAPSED} -lt ${MAX_WAIT} ]]; do
            if [[ -f /shared/port-forward-status ]]; then
              STATUS=$(cat /shared/port-forward-status)
              if [[ "${STATUS}" == "ready" ]]; then
                echo "✓ Port-forward sidecar is ready!"
                break
              elif [[ "${STATUS}" == "failed" ]]; then
                echo "ERROR: Port-forward sidecar failed to start"
                exit 1
              elif [[ "${STATUS}" == "skipped" ]]; then
                echo "ERROR: Port-forward was skipped but required for local cluster"
                exit 1
              fi
            fi
            echo "Waiting for port-forward readiness (${ELAPSED}s/${MAX_WAIT}s)..."
            sleep 2
            ELAPSED=$((ELAPSED + 2))
          done

          if [[ ${ELAPSED} -ge ${MAX_WAIT} ]]; then
            echo "ERROR: Port-forward not ready after ${MAX_WAIT}s"
            echo "Status file contents:"
            cat /shared/port-forward-status 2>/dev/null || echo "Status file not found"
            exit 1
          fi

          # Port-forward maps localhost:8080 to nginx HTTPS port (9443)
          export CYPRESS_KONFLUX_BASE_URL="https://localhost:8080"
        fi

        # Run tests
        SPEC_FILE="tests/basic-happy-path.spec.ts"
        echo ""
        echo "Running: ${SPEC_FILE}"
        echo "CYPRESS_KONFLUX_BASE_URL: ${CYPRESS_KONFLUX_BASE_URL:-not set}"
        echo "CYPRESS_LOCAL_CLUSTER: ${CYPRESS_LOCAL_CLUSTER}"
        echo "CYPRESS_PERIODIC_RUN_STAGE: ${CYPRESS_PERIODIC_RUN_STAGE}"
        echo ""

        # Build Cypress command with optional recording
        CYPRESS_ARGS="--runner-ui -b chrome --spec ${SPEC_FILE}"

        if [[ -n "${CYPRESS_PROJECT_ID:-}" && -n "${CYPRESS_RECORD_KEY:-}" ]]; then
          echo "✓ Cypress Cloud recording enabled"
          echo "  Project ID: ${CYPRESS_PROJECT_ID}"
          CYPRESS_ARGS="${CYPRESS_ARGS} --record --tag ${JOB_TYPE}"
        else
          echo "ℹ Cypress Cloud recording disabled (PROJECT_ID or RECORD_KEY not set)"
        fi

        echo "Running: npx cypress run ${CYPRESS_ARGS}"
        npx cypress run ${CYPRESS_ARGS} || EXIT_CODE=$?

        EXIT_CODE=${EXIT_CODE:-0}
        echo ${EXIT_CODE} > /tmp/e2e-exit-code
        exit ${EXIT_CODE}

    - name: report-to-slack
      image: quay.io/konflux-ci/appstudio-utils:ab6b0b8e40e440158e7288c73aff1cf83a2cc8a9@sha256:24179f0efd06c65d16868c2d7eb82573cce8e43533de6cea14fec3b7446e0b14
      env:
        - name: JOB_TYPE
          value: $(params.job-type)
        - name: SLACK_TOKEN
          valueFrom:
            secretKeyRef:
              name: $(params.slack-credentials-secret)
              key: token
              optional: true
        - name: SLACK_CHANNEL_ID
          valueFrom:
            configMapKeyRef:
              name: slack-config
              key: channel-id
              optional: true
        - name: PIPELINE_RUN_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.labels['tekton.dev/pipelineRun']
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
      script: |
        #!/usr/bin/env bash

        # Only send Slack report for periodic jobs
        if [[ ! ${JOB_TYPE} == periodic* ]]; then
          echo "Not a periodic job (JOB_TYPE=${JOB_TYPE}), skipping Slack report"
          exit 0
        fi

        # Check if Slack is configured
        if [[ -z "${SLACK_TOKEN}" || -z "${SLACK_CHANNEL_ID}" ]]; then
          echo "Slack not configured, skipping report"
          exit 0
        fi

        # Determine test outcome
        E2E_OUTCOME="success"
        if [[ -f /tmp/e2e-exit-code ]] && [[ $(cat /tmp/e2e-exit-code) -ne 0 ]]; then
          E2E_OUTCOME="failure"
        fi

        # Generate message
        if [[ $E2E_OUTCOME == "success" ]]; then
          ICON=":white_check_mark:"
        else
          ICON=":x:"
        fi

        DATE_STR=$(date '+%b %-d')

        case "$JOB_TYPE" in
          "periodic-local")
            JOB_DESC="LOCAL Periodic job"
            ;;
          "periodic-stage")
            JOB_DESC="STAGE Periodic job"
            ;;
          "periodic-cleanup")
            JOB_DESC="CLEANUP Periodic job"
            ;;
          *)
            JOB_DESC="Periodic job (${JOB_TYPE})"
            ;;
        esac

        # Add PipelineRun info to message
        if [[ -n "${PIPELINE_RUN_NAME}" ]]; then
          MESSAGE="${ICON} Report ${DATE_STR}: ${JOB_DESC} (PipelineRun: ${PIPELINE_RUN_NAME})"
        else
          MESSAGE="${ICON} Report ${DATE_STR}: ${JOB_DESC}"
        fi

        echo "Sending Slack notification: ${MESSAGE}"

        # Send to Slack
        curl -X POST https://slack.com/api/chat.postMessage \
          -H "Authorization: Bearer ${SLACK_TOKEN}" \
          -H "Content-Type: application/json; charset=utf-8" \
          -d "{\"channel\": \"${SLACK_CHANNEL_ID}\", \"text\": \"${MESSAGE}\"}" \
          || echo "Failed to send Slack notification (non-fatal)"
