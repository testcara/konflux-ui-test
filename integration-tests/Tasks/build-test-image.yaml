apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: build-test-image
  annotations:
    tekton.dev/displayName: 'Build E2E Test Image'
    tekton.dev/categories: 'Build'
    tekton.dev/tags: 'build,e2e,docker'
spec:
  description: >-
    Check if e2e-tests directory has changes and rebuild the test image if needed.
    If no changes, use the default image from quay.io.
  params:
    - name: git-url
      type: string
      description: 'Git repository URL'
    - name: git-revision
      type: string
      description: 'Git revision (commit SHA)'
    - name: target-branch
      type: string
      default: 'main'
      description: 'Target branch to compare against'
    - name: pull-request-number
      type: string
      description: 'Pull request number'
    - name: default-test-image
      type: string
      default: 'quay.io/konflux_ui_qe/konflux-ui-tests:latest'
      description: 'Default test image to use if no changes detected'
    - name: test-image-repo
      type: string
      default: 'quay.io/konflux_ui_qe/konflux-ui-tests'
      description: 'Repository to push the built test image'
    - name: pr-test-image
      type: string
      default: ''
      description: 'PR-specific test image (if exists from Konflux build)'
    - name: quay-secret
      type: string
      default: 'quay-secret'
      description: 'Secret containing Quay.io credentials'
  results:
    - name: test-image
      description: 'The test image to use for E2E tests'
  volumes:
    - name: quay-auth
      secret:
        secretName: $(params.quay-secret)
        optional: true
    - name: varlibcontainers
      emptyDir: {}
  steps:
    - name: check-changes
      image: alpine/git:latest
      workingDir: /workspace
      script: |
        #!/bin/sh
        set -eu

        echo "=== Checking for e2e-tests changes ==="

        # Clone the repository to a fresh directory
        rm -rf /workspace/repo
        git clone $(params.git-url) /workspace/repo
        cd /workspace/repo
        git checkout $(params.git-revision)

        # Check if e2e-tests directory has changes compared to target branch
        git fetch origin $(params.target-branch)

        if git diff --name-only origin/$(params.target-branch)...HEAD | grep -q "^e2e-tests/"; then
          echo "✅ Changes detected in e2e-tests/"
          echo -n "true" > /workspace/needs-build
        else
          echo "ℹ️  No changes in e2e-tests/"
          echo -n "false" > /workspace/needs-build
        fi

    - name: build-image
      image: quay.io/buildah/stable:latest
      workingDir: /workspace/repo/e2e-tests
      volumeMounts:
        - name: quay-auth
          mountPath: /secrets/quay
          readOnly: true
        - name: varlibcontainers
          mountPath: /var/lib/containers
      env:
        - name: STORAGE_DRIVER
          value: vfs
        - name: IMAGE_TAG
          value: $(params.test-image-repo):pr-$(params.pull-request-number)
        - name: DEFAULT_IMAGE
          value: $(params.default-test-image)
      script: |
        #!/bin/bash
        set -euo pipefail

        NEEDS_BUILD=$(cat /workspace/needs-build)

        if [ "$NEEDS_BUILD" = "true" ]; then
          echo "=== Building test image ==="

          # Setup authentication
          if [ -f /secrets/quay/.dockerconfigjson ]; then
            mkdir -p ${HOME}/.docker
            cp /secrets/quay/.dockerconfigjson ${HOME}/.docker/config.json
            echo "✅ Quay credentials configured"
          else
            echo "⚠️  No Quay credentials found, build may fail if pushing to private registry"
          fi

          # Build the image
          buildah --storage-driver=${STORAGE_DRIVER} bud \
            --format=docker \
            --tls-verify=true \
            --no-cache \
            -f ./Containerfile \
            -t ${IMAGE_TAG} \
            .

          # Push the image
          echo "=== Pushing image: ${IMAGE_TAG} ==="
          buildah --storage-driver=${STORAGE_DRIVER} push \
            --tls-verify=true \
            ${IMAGE_TAG} \
            docker://${IMAGE_TAG}

          echo "✅ Image built and pushed successfully"
          echo -n "${IMAGE_TAG}" > $(results.test-image.path)
        else
          echo "=== Using default test image ==="
          echo "No changes detected, using: ${DEFAULT_IMAGE}"
          echo -n "${DEFAULT_IMAGE}" > $(results.test-image.path)
        fi

        echo ""
        echo "📦 Final test image: $(cat $(results.test-image.path))"
