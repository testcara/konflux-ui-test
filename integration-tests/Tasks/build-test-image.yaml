apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: build-test-image
  annotations:
    tekton.dev/displayName: 'Build E2E Test Image'
    tekton.dev/categories: 'Build'
    tekton.dev/tags: 'build,e2e,docker'
spec:
  description: >-
    Check if e2e-tests directory has changes and rebuild the test image if needed.
    If no changes, use the default image from quay.io.
  params:
    - name: git-url
      type: string
      description: 'Git repository URL'
    - name: git-revision
      type: string
      description: 'Git revision (commit SHA)'
    - name: target-branch
      type: string
      default: 'main'
      description: 'Target branch to compare against'
    - name: pull-request-number
      type: string
      description: 'Pull request number'
    - name: default-test-image
      type: string
      default: 'quay.io/konflux_ui_qe/konflux-ui-tests:latest'
      description: 'Default test image to use if no changes detected'
    - name: test-image-repo
      type: string
      default: 'quay.io/konflux_ui_qe/konflux-ui-tests'
      description: 'Repository to push the built test image'
    - name: pr-test-image
      type: string
      default: ''
      description: 'PR-specific test image (if exists from Konflux build)'
    - name: quay-secret
      type: string
      default: 'quay-secret'
      description: 'Secret containing Quay.io credentials'
  results:
    - name: test-image
      description: 'The test image to use for E2E tests'
  workspaces:
    - name: dockerconfig
      description: 'Docker config secret for registry authentication'
      optional: true
      mountPath: /tekton/home/.docker
  steps:
    - name: select-test-image
      image: quay.io/skopeo/stable:latest
      env:
        - name: PR_TEST_IMAGE
          value: $(params.pr-test-image)
        - name: DEFAULT_IMAGE
          value: $(params.default-test-image)
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        echo "=== Selecting test image for E2E tests ==="

        # Check if PR-specific image exists
        if [ -n "${PR_TEST_IMAGE}" ]; then
          echo "Checking if PR-specific image exists: ${PR_TEST_IMAGE}"

          # Try to inspect the image (will fail if it doesn't exist)
          if skopeo inspect --no-tags "docker://${PR_TEST_IMAGE}" > /dev/null 2>&1; then
            echo "✅ PR-specific test image found: ${PR_TEST_IMAGE}"
            echo "This image was built by Konflux when e2e-tests/ changes were detected"
            echo -n "${PR_TEST_IMAGE}" > $(results.test-image.path)
          else
            echo "ℹ️  PR-specific image not found (probably no e2e-tests/ changes)"
            echo "Using default image: ${DEFAULT_IMAGE}"
            echo -n "${DEFAULT_IMAGE}" > $(results.test-image.path)
          fi
        else
          echo "ℹ️  No PR number provided, using default image: ${DEFAULT_IMAGE}"
          echo -n "${DEFAULT_IMAGE}" > $(results.test-image.path)
        fi

        echo ""
        echo "📦 Final test image selected: $(cat $(results.test-image.path))"
