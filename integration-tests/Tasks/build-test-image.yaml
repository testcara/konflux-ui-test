apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: build-test-image
  annotations:
    tekton.dev/displayName: 'Build E2E Test Image'
    tekton.dev/categories: 'Build'
    tekton.dev/tags: 'build,e2e,docker'
spec:
  description: >-
    Check if e2e-tests directory has changes and rebuild the test image if needed.
    If no changes, use the default image from quay.io.
  params:
    - name: git-url
      type: string
      description: 'Git repository URL'
    - name: git-revision
      type: string
      description: 'Git revision (commit SHA)'
    - name: target-branch
      type: string
      default: 'main'
      description: 'Target branch to compare against'
    - name: pull-request-number
      type: string
      description: 'Pull request number'
    - name: default-test-image
      type: string
      default: 'quay.io/konflux_ui_qe/konflux-ui-tests:latest'
      description: 'Default test image to use if no changes detected'
    - name: test-image-repo
      type: string
      default: 'quay.io/konflux_ui_qe/konflux-ui-tests'
      description: 'Repository to push the built test image'
    - name: pr-test-image
      type: string
      default: ''
      description: 'PR-specific test image (if exists from Konflux build)'
    - name: quay-secret
      type: string
      default: 'quay-secret'
      description: 'Secret containing Quay.io credentials'
  results:
    - name: test-image
      description: 'The test image to use for E2E tests'
  volumes:
    - name: quay-auth
      secret:
        secretName: $(params.quay-secret)
        optional: true
  steps:
    - name: check-changes
      image: alpine/git:latest
      workspace: source
      script: |
        #!/bin/sh
        set -eu
        # Use the workspace path explicitly
        cd $(workspaces.source.path)

        # Sparse clone or full clone logic
        git clone $(params.git-url) repo
        cd repo
        git checkout $(params.git-revision)
        git fetch origin $(params.target-branch)

        if git diff --name-only origin/$(params.target-branch)...HEAD | grep -q "^e2e-tests/"; then
          echo "true" > $(workspaces.source.path)/needs-build
        else
          echo "false" > $(workspaces.source.path)/needs-build
        fi

    - name: build-image
      image: gcr.io/kaniko-project/executor:debug
      # Kaniko debug image uses /busybox/sh
      command: ['/busybox/sh', '-c']
      args:
        - |
          set -eu
          NEEDS_BUILD=$(cat $(workspaces.source.path)/needs-build)

          if [ "$NEEDS_BUILD" = "true" ]; then
            # Setup Docker config for Kaniko
            if [ -d /kaniko/.docker ]; then
               mkdir -p /root/.docker
               cp /kaniko/.docker/.dockerconfigjson /root/.docker/config.json
            fi

            /kaniko/executor \
              --context=$(workspaces.source.path)/repo/e2e-tests \
              --dockerfile=$(workspaces.source.path)/repo/e2e-tests/Containerfile \
              --destination=$(params.test-image-repo):pr-$(params.pull-request-number)
            
            echo -n "$(params.test-image-repo):pr-$(params.pull-request-number)" > $(results.test-image.path)
          else
            echo -n "$(params.default-test-image)" > $(results.test-image.path)
          fi
      volumeMounts:
        - name: quay-auth
          mountPath: /kaniko/.docker
