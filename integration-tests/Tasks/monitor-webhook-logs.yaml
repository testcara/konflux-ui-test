apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: monitor-webhook-logs
  annotations:
    tekton.dev/displayName: 'Monitor Webhook Logs'
    tekton.dev/categories: 'Monitoring'
    tekton.dev/tags: 'logs,debug,webhook'
spec:
  description: >-
    Monitors smee-client and pipelines-as-code controller logs during E2E test execution.
    Runs in background and outputs logs to help debug webhook forwarding issues.
  params:
    - name: monitoring-duration
      type: string
      default: '10m'
      description: 'How long to monitor (e.g., 5m, 10m, 30m)'
  steps:
    - name: setup-monitoring
      image: bitnami/kubectl:latest
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        echo "=== Getting PipelineRun name and kubeconfig ==="

        # Get PipelineRun name and namespace from environment variables
        PIPELINE_RUN_NAME="${TEKTON_PIPELINE_RUN}"
        NAMESPACE="${TEKTON_NAMESPACE}"
        echo "PipelineRun name: ${PIPELINE_RUN_NAME}"
        echo "Namespace: ${NAMESPACE}"

        # Construct the secret name
        SECRET_NAME="kfg-${PIPELINE_RUN_NAME}"
        echo "Looking for secret: ${SECRET_NAME}"

        # Extract kubeconfig from the secret
        kubectl get secret ${SECRET_NAME} -n ${NAMESPACE} -o jsonpath='{.data.kubeconfig}' | base64 -d > /tmp/kubeconfig

        # Switch to Kind cluster context
        export KUBECONFIG=/tmp/kubeconfig

        echo "=== Starting log monitoring ==="
        echo "Monitoring duration: $(params.monitoring-duration)"
        echo "=========================================="

        # Function to stream logs with timestamps
        monitor_logs() {
          local namespace=$1
          local label=$2
          local component=$3

          echo ""
          echo "### Monitoring ${component} ###"

          # Get pod name
          POD=$(kubectl get pod -n ${namespace} -l ${label} -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "")

          if [[ -z "${POD}" ]]; then
            echo "⚠️  No pod found for ${component}"
            return
          fi

          echo "Pod: ${POD}"

          # Follow logs in background
          kubectl logs -n ${namespace} ${POD} -f --tail=50 --timestamps 2>&1 | while read line; do
            echo "[${component}] ${line}"
          done &
        }

        # Monitor smee-client
        monitor_logs "smee-client" "app=gosmee-client" "SMEE-CLIENT"

        # Monitor pipelines-as-code controller
        monitor_logs "pipelines-as-code" "app.kubernetes.io/name=controller" "PAC-CONTROLLER"

        echo ""
        echo "=========================================="
        echo "✓ Log monitoring started"
        echo "Logs will stream for $(params.monitoring-duration)"
        echo "=========================================="
        echo ""

        # Keep monitoring for the specified duration
        DURATION=$(params.monitoring-duration)
        SECONDS=${DURATION//[!0-9]/}
        UNIT=${DURATION//[0-9]/}

        case ${UNIT} in
          m|M)
            SLEEP_TIME=$((SECONDS * 60))
            ;;
          s|S)
            SLEEP_TIME=${SECONDS}
            ;;
          h|H)
            SLEEP_TIME=$((SECONDS * 3600))
            ;;
          *)
            echo "Unknown time unit: ${UNIT}, defaulting to minutes"
            SLEEP_TIME=$((SECONDS * 60))
            ;;
        esac

        echo "Sleeping for ${SLEEP_TIME} seconds..."
        sleep ${SLEEP_TIME}

        echo ""
        echo "=========================================="
        echo "✓ Monitoring complete"
        echo "=========================================="
      env:
        - name: TEKTON_PIPELINE_RUN
          valueFrom:
            fieldRef:
              fieldPath: metadata.labels['tekton.dev/pipelineRun']
        - name: TEKTON_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
